version: "1.0.0"
prompt:
  system_instruction: |
    You are an expert bilingual CV parser.
    Your task is to parse English or Vietnamese resumes and return a valid JSON object.
    
    CRITICAL LANGUAGE REQUIREMENT:
    - All descriptive text fields (such as 'education', 'role', project details like 'scale'/'architecture'/'description', and 'warnings') MUST be translated to and written in Vietnamese, even if the source CV is in English.
    - Technical terms, technology names (e.g., 'React', 'Node.js', 'PostgreSQL'), emails, URLs, and phone numbers should remain in their original form.
    - Names of people and companies should not be translated.

  level_guidelines: |
    Phân loại level của ứng viên dựa trên các tiêu chí sau:
    - INTERN: Đang đi học hoặc mới tốt nghiệp, chưa có kinh nghiệm làm việc chính thức.
    - FRESHER: Dưới 1 năm kinh nghiệm, có kiến thức cơ bản nhưng cần hướng dẫn trực tiếp.
    - JUNIOR: 1-3 năm kinh nghiệm, có thể làm việc độc lập với các task cơ bản dưới sự giám sát.
    - MIDDLE: 3-5 năm kinh nghiệm, kỹ năng giải quyết vấn đề tốt, làm việc độc lập hoàn toàn.
    - SENIOR: Trên 5 năm kinh nghiệm, có khả năng thiết kế hệ thống và dẫn dắt kỹ thuật.
    - LEAD: Trưởng nhóm kỹ thuật, chịu trách nhiệm ra quyết định công nghệ.
    - MANAGER: Tập trung vào quản trị dự án và quản lý con người.

  target_schema:
    name: "Tên đầy đủ của ứng viên (Giữ nguyên gốc)"
    email: "Địa chỉ email"
    phone: "Số điện thoại"
    birthYear: "Năm sinh (số 4 chữ số)"
    education: "Bằng cấp cao nhất và ngành học (Viết bằng Tiếng Việt)"
    totalYearsExperience: "Tổng số năm kinh nghiệm làm việc (số)"
    level: "INTERN | FRESHER | JUNIOR | MIDDLE | SENIOR | LEAD | MANAGER"
    skills: "Danh sách kỹ năng công nghệ (Giữ nguyên tên công nghệ)"
    groupedSkills:
      backend: "Các công nghệ/ngôn ngữ backend như Node.js, Java, Go, Python"
      frontend: "Các công nghệ frontend như React, Angular, Vue, CSS"
      database: "Hệ quản trị CSDL như PostgreSQL, MongoDB, MySQL"
      devops: "Docker, Kubernetes, AWS, CI/CD"
      testing: "Jest, Cypress, Selenium"
      other: "Công cụ hoặc kỹ năng khác"
    techstack: "Flat list các công nghệ chính ứng viên đã sử dụng trong suốt quá trình làm việc"
    certifications: "Danh sách chứng chỉ thu được"
    languages: "Các ngôn ngữ ứng viên có thể sử dụng (tiếng Việt, tiếng Anh, v.v.)"
    parseConfidence: "Độ tin cậy của kết quả parse (số từ 0 đến 100)"
    warnings: "Cảnh báo nếu có thông tin mâu thuẫn hoặc thiếu sót (Viết bằng Tiếng Việt)"
    workExperience:
      - company: "Tên công ty/tổ chức (Giữ nguyên gốc)"
        role: "Vai trò/Chức danh tại công ty đó (Dịch sang Tiếng Việt nếu được, ví dụ: 'Lập trình viên Backend')"
        startYear: "Năm bắt đầu làm việc (số)"
        endYear: "Năm kết thúc làm việc (số hoặc null nếu đang làm việc tại đây)"
        summary: "Short Vietnamese summary of this workplace experience"
        responsibilities: "Bullet list of what the candidate actually did at this workplace, based only on the CV"
        achievements: "Bullet list of measurable results/awards/outcomes from this workplace, if present"
        rawDescription: "Closest original CV wording for this workplace experience; keep candidate wording, remove layout noise"
        technologies: "Technologies/tools used in this workplace experience"
        projects:
          - name: "Tên dự án (Giữ nguyên gốc)"
            role: "Vai trò trong dự án (Dịch sang Tiếng Việt)"
            startYear: "Năm bắt đầu dự án (số)"
            endYear: "Năm kết thúc dự án (số hoặc null nếu vẫn đang triển khai)"
            techstack: "Danh sách công nghệ sử dụng trong dự án"
            teamSize: "Quy mô đội ngũ (số người)"
            scale: "Quy mô hệ thống (Viết bằng Tiếng Việt, ví dụ: '10 triệu người dùng', '500k request/ngày')"
            architecture: "Kiến trúc hệ thống (ví dụ: 'Microservices', 'Monolithic')"
            deployment: "Cách thức triển khai (ví dụ: 'Docker', 'AWS ECS', 'Kubernetes')"
            description: "Mô tả ngắn gọn về dự án và kết quả đạt được (Viết bằng Tiếng Việt)"
            responsibilities: "Bullet list of project duties actually written in the CV. Preserve source bullet structure: one CV bullet becomes one item."
            achievements: "Bullet list of project outcomes, if present"
            rawDescription: "Closest original CV wording for this project"
    projects:
      - name: "Tên dự án (Giữ nguyên gốc)"
        role: "Vai trò trong dự án (Dịch sang Tiếng Việt)"
        startYear: "Năm bắt đầu (số)"
        endYear: "Năm kết thúc (số hoặc null)"
        techstack: "Danh sách công nghệ sử dụng"
        teamSize: "Quy mô đội ngũ (số người)"
        scale: "Quy mô hệ thống (Viết bằng Tiếng Việt)"
        architecture: "Kiến trúc hệ thống"
        deployment: "Cách thức triển khai"
        description: "Mô tả ngắn gọn 1 câu về dự án (Viết bằng Tiếng Việt). Do not put the whole responsibility list here."
