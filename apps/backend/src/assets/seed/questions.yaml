- code: "Q193"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho ví dụ lần bạn thuyết phục team adopt một technology/practice mới (ví dụ: viết unit test, dùng TypeScript). Bạn thuyết phục thế nào?
  expectedAnswer: |-
    Lead with value, không với enthusiasm.
    Proof of concept: show it working.
    Metrics: before/after comparison.
    Pilot: 1 sprint thử nghiệm, evaluate.
    Address concerns: learning curve, timeline.
    Don't mandate — invite.
  scoringGuide: *scoringBase

- code: "Q194"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Codebase có technical debt nghiêm trọng. Bạn build business case như thế nào để management cho time refactor?
  expectedAnswer: |-
    Translate to business: "This debt causes X incidents/quarter, costs Y hours to maintain, slows new feature delivery by Z%".
    Show risk if not addressed.
    Propose: specific scope, timeline, expected outcomes.
    Frame as investment, not cleanup.
  scoringGuide: *scoringBase

- code: "Q195"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Đề xuất của bạn bị từ chối vì "không có budget". Bạn phản ứng thế nào và có tiếp tục pursue không?
  expectedAnswer: |-
    Understand real objection: budget constraint hay not convinced of value? Address root cause.
    Break down into smaller phases.
    Find cheaper alternative.
    Revisit at next planning cycle.
    Know when to drop: sometimes timing is wrong.
  scoringGuide: *scoringBase

- code: "Q196"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn propose breaking change API sẽ ảnh hưởng 5 team khác. Bạn thuyết phục các team chấp nhận thế nào?
  expectedAnswer: |-
    Involve early: RFC draft trước khi finalize.
    Address each team's concern.
    Migration path: step-by-step, tools, support.
    Timeline: give adequate migration time.
    Incentive: show how new API is better for them.
    Support: dedicate migration support resources.
  scoringGuide: *scoringBase

- code: "Q197"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    2 senior engineer bất đồng về technical approach, bạn là người trung gian. Bạn facilitate decision thế nào?
  expectedAnswer: |-
    Không pick sides early.
    Reframe: cả 2 muốn best outcome, disagree on how.
    List tradeoffs objectively.
    Criteria: define decision criteria (performance, cost, simplicity, team expertise).
    Timebox discussion.
    Consent vs consensus: proceed if no strong objection.
  scoringGuide: *scoringBase

- code: "Q198"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn muốn adopt new framework nhưng team lead không đồng ý. Bạn influence thế nào mà không gây friction?
  expectedAnswer: |-
    Understand objection: risk averse, familiarity, timeline.
    Build credibility: show you've evaluated alternatives.
    Suggest small pilot: low-risk area, bounded scope.
    Document learnings.
    Let results speak.
    Be OK if answer is still no — trust builds over time.
  scoringGuide: *scoringBase

- code: "Q199"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể lần bạn thay đổi quyết định của một người khác bằng dữ liệu/metrics.
  expectedAnswer: |-
    Collect relevant data trước.
    Present objectively, không manipulative.
    Let data tell story.
    Give time to digest.
    Don't force: "This is what data shows, what do you think?" Acknowledge uncertainty in data.
    Combine data với narrative/context.
  scoringGuide: *scoringBase

- code: "Q200"
  category: SOFT_SKILL
  subcategory: "Thuyết phục"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể lần bạn bị thuyết phục thay đổi technical opinion của mình. Điều gì khiến bạn thay đổi?
  expectedAnswer: |-
    Show intellectual humility.
    Examples: evidence-based argument, new information, practical demonstration.
    Điều thuyết phục: data tốt hơn gut feeling, demo working solution, identify flaw trong own reasoning.
    Growth mindset: changing mind = learning, không phải weakness.
  scoringGuide: *scoringBase

