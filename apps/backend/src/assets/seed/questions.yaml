  expectedAnswer: |-
    PostgreSQL: schema cố định, cần ACID, relational data, complex queries (banking, e-commerce).
    MongoDB: schema linh hoạt, document-oriented, nested data, horizontal scale đơn giản (CMS, catalog, events).
    Không nên chọn MongoDB chỉ vì "NoSQL nhanh hơn" — depends on use case và query patterns.
  scoringGuide: *scoringBase

- code: "Q041"
  category: BACKEND_MUST
