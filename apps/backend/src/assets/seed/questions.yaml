- code: "Q059"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Read-write lock là gì? Cho bài toán phù hợp để dùng read-write lock thay vì mutex thường. Trade-off là gì?
  expectedAnswer: |-
    RWMutex: multiple readers OR 1 writer.
    Không block readers với nhau.
    Bài toán phù hợp: in-memory config cache được đọc nhiều, cập nhật ít (vd: mỗi 5 phút).
    Trade-off: RWMutex overhead hơn Mutex khi write contention cao.
    Write starvation nếu liên tục có reader.
    Go: sync.RWMutex, Java: ReentrantReadWriteLock.
