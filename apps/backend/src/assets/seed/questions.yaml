- code: "Q121"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Scrum có những ceremony gì? Timeboxing của mỗi ceremony trong Sprint 2 tuần là bao nhiêu?
  expectedAnswer: |-
    Sprint Planning: 4h.
    Daily Scrum: 15 phút/ngày.
    Sprint Review: 2h.
    Sprint Retrospective: 1.5h.
    Refinement: không phải ceremony chính thức nhưng khuyến nghị.
    Timebox là max — kết thúc sớm nếu đã đủ.
  scoringGuide: *scoringBase

- code: "Q122"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Definition of Done và Acceptance Criteria khác nhau thế nào? Ai responsible?
  expectedAnswer: |-
    DoD: checklist team-level cho mọi story (code reviewed, tests passed, deployed to staging).
    Consistent cho tất cả stories.
    Acceptance Criteria: điều kiện cụ thể cho từng user story (Given-When-Then).
    Product Owner viết/validate AC.
    Team define và maintain DoD.
    Story "Done" = pass AC + pass DoD.
  scoringGuide: *scoringBase

- code: "Q123"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Product Backlog và Sprint Backlog: sự khác biệt và ai manage từng loại?
  expectedAnswer: |-
    Product Backlog: toàn bộ work của product, ordered by value, managed by Product Owner.
    Sprint Backlog: subset PB cho sprint hiện tại + Sprint Goal + plan.
    Owned by Development Team.
    Team không nhận thêm work giữa sprint trừ khi tự chọn.
  scoringGuide: *scoringBase

- code: "Q124"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Agile manifesto: 4 giá trị và 12 nguyên tắc — kể tên 4 giá trị.
  expectedAnswer: |-
    (1) Individuals and interactions over processes and tools.
    (2) Working software over comprehensive documentation.
    (3) Customer collaboration over contract negotiation.
    (4) Responding to change over following a plan.
    Vế bên phải vẫn có giá trị — chỉ là ưu tiên vế trái hơn.
  scoringGuide: *scoringBase

- code: "Q125"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Giữa sprint, stakeholder yêu cầu thêm task gấp. Team đang chạy sprint 2 tuần, đã commit 60 story point. Bạn xử lý thế nào theo đúng Scrum?
  expectedAnswer: |-
    Scrum: Sprint Goal phải được bảo vệ.
    Không add giữa sprint mà không tradeoff.
    Options: (1) Thêm vào Product Backlog cho sprint sau, (2) Nếu urgent thực sự: negotiate với PO để drop task tương đương story point, (3) Nếu cực kỳ critical: Sprint Cancellation.
    Scrum Master protect team từ scope creep.
  scoringGuide: *scoringBase

- code: "Q126"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Daily standup của team kéo dài 30 phút mỗi ngày. Bạn identify vấn đề và cải thiện thế nào?
  expectedAnswer: |-
    Vấn đề: problem-solving trong standup, status report thay vì sync.
    Fix: 3 câu hỏi nghiêm túc (hôm qua làm gì, hôm nay làm gì, blocker).
    Discussions "take it offline".
    Timebox: 15 phút max.
    Đứng (không ngồi) để giữ ngắn.
    Parking lot cho topics cần discuss sau.
    Facilitator nhắc nhở khi off-topic.
  scoringGuide: *scoringBase

- code: "Q127"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Sprint Review: demo xong stakeholder nói "không phải thứ tôi muốn". Nguyên nhân là gì và action item cho sprint sau?
  expectedAnswer: |-
    Root cause: Acceptance Criteria không rõ ràng, hoặc không có mid-sprint check-in.
    Actions: (1) Refinement kỹ hơn — AC cụ thể hơn với examples/mockups, (2) Mid-sprint demo sau 3-4 ngày để catch sớm, (3) Involve stakeholder viết AC, (4) Use Given-When-Then format.
    Đây là Agile failure bình thường — inspect and adapt.
  scoringGuide: *scoringBase

- code: "Q128"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Team support (bug fix, on-call) khó dùng Scrum vì interrupt liên tục. Bạn đề xuất framework nào phù hợp hơn?
  expectedAnswer: |-
    Kanban: pull-based, WIP limits, continuous flow, no sprints.
    Phù hợp cho support team vì không commit sprint goal.
    Scrumban: hybrid — sprint planning nhưng Kanban board.
    Buffer capacity: reserve 20-30% capacity cho unplanned work.
    SLA tracking thay vì velocity.
  scoringGuide: *scoringBase

- code: "Q129"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    3 Scrum team song song cùng product, dependency giữa các team. Bạn tổ chức dependency tracking và sprint planning thế nào để không block nhau?
  expectedAnswer: |-
    Scaled Agile: SAFe (Program Increment planning, ART), LeSS, Nexus.
    Practical: cross-team Scrum of Scrums (daily/weekly).
    Dependency mapping trước sprint planning.
    API contracts: agree on interface trước khi implement.
    Component teams vs feature teams.
    Stagger sprints 1 week để team A deliver trước team B cần.
  scoringGuide: *scoringBase

- code: "Q130"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Retrospective đều đặn nhưng cùng vấn đề tái diễn 5 sprint. Bạn thay đổi format thế nào để tạo ra cải tiến thực sự?
  expectedAnswer: |-
    Root cause: action items không được track, không có owner, không measure.
    Fix: (1) Limit to 1-2 action items per retro, (2) Assign owner + due date, (3) Review previous retro actions trước khi bắt đầu, (4) Format thay đổi: 4Ls, DAKI, Sailboat.
    (5) Blameless retrospective.
    Measure improvement với metrics.
  scoringGuide: *scoringBase

- code: "Q131"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Technical debt accumulate nhiều sprint. Bạn introduce "tech debt sprint" hay xen kẽ vào sprint bình thường? Trade-off?
  expectedAnswer: |-
    "Tech debt sprint" (nhược): features bị block, business pressure để skip, debt accumulate đến mức "emergency only".
    Xen kẽ (ưu): 20% capacity per sprint cho tech debt, sustainable, không disrupt flow.
    Recommendation: make debt visible (tech debt backlog), prioritize như features, giải thích business risk của từng debt item.
    Boy Scout Rule: leave code better than you found it.
  scoringGuide: *scoringBase

- code: "Q132"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn là scrum master cho team mới: 3 developer senior, 2 junior. Bạn setup quy trình Scrum thế nào cho tháng đầu?
  expectedAnswer: |-
    Week 1: working agreement, tools setup (Jira/Linear), DoD draft.
    Sprint 1 ngắn (1 tuần): team learn rhythm, không pressure.
    Estimation: Planning Poker với cả team.
    Pair programming: senior-junior.
    Retro sau mỗi sprint: adjust process.
    Focus: team forming trước process perfecting.
    Protect juniors: không overload, give safe space to fail.
  scoringGuide: *scoringBase

