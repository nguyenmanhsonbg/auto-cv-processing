- code: "Q097"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    API Gateway là gì? Kể tên ít nhất 5 chức năng của API Gateway trong kiến trúc microservices.
  expectedAnswer: |-
    API Gateway: single entry point cho clients.
    Chức năng: (1) Routing, (2) Authentication/Authorization, (3) Rate limiting, (4) Load balancing, (5) SSL termination, (6) Request/response transformation, (7) Caching, (8) Logging/monitoring, (9) Circuit breaking.
    Tools: Kong, AWS API Gateway, Nginx.
  scoringGuide: *scoringBase

- code: "Q098"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    gRPC và RESTful API khác nhau thế nào? Cho ví dụ bài toán phù hợp với gRPC hơn REST.
  expectedAnswer: |-
    REST: HTTP/1.1, JSON, human-readable, request/response. gRPC: HTTP/2, Protocol Buffers (binary), streaming, strong-typed contract. gRPC phù hợp: inter-service communication (low latency, high throughput), bidirectional streaming (real-time), polyglot services với code gen.
    REST phù hợp: public API, browser clients, simplicity.
  scoringGuide: *scoringBase

- code: "Q099"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Stateful và stateless service khác nhau thế nào? Tại sao stateless dễ scale horizontal hơn?
  expectedAnswer: |-
    Stateful: lưu session/state trong memory của instance — request phải đến đúng instance.
    Stateless: không lưu state — mọi request có đủ thông tin để xử lý, bất kỳ instance nào cũng handle được.
    Scale horizontal: stateless → add instance → done.
    Stateful → sticky session hoặc cần state sync.
    Best practice: externalize state (Redis, DB).
  scoringGuide: *scoringBase

- code: "Q100"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Service discovery là gì? Client-side vs server-side discovery khác nhau thế nào?
  expectedAnswer: |-
    Service discovery: cơ chế tìm địa chỉ service khi scale dynamically.
    Client-side: client query service registry (Consul, Eureka), tự chọn instance, client cần discovery logic.
    Server-side: client gọi load balancer, LB query registry, transparent với client.
    Tools: Kubernetes service (server-side), Eureka (client-side).
  scoringGuide: *scoringBase

- code: "Q101"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Service A cần gọi Service B qua HTTP. Service B đôi khi bị chậm. Bạn thêm timeout 3s và retry 2 lần thế nào trong HTTP client?
  expectedAnswer: |-
    HTTP client config: timeout: 3s.
    Retry: 2 lần với exponential backoff (100ms, 200ms).
    Retry chỉ cho idempotent requests (GET, PUT) — không retry POST không idempotent.
    Circuit breaker đi kèm.
    Libraries: resilience4j, go-retryablehttp.
    Jitter để tránh thundering herd khi retry đồng loạt.
  scoringGuide: *scoringBase

- code: "Q102"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    API Gateway cần xác thực JWT trước khi forward request đến service phía sau. Bạn implement middleware thế nào?
  expectedAnswer: |-
    Middleware: extract Bearer token từ Authorization header, verify signature và expiry, decode payload, inject user context vào request headers (X-User-Id, X-User-Role).
    Services nhận headers mà không cần verify JWT lại.
    Centralized auth logic.
    Public paths: skip JWT check (health check, login endpoint).
  scoringGuide: *scoringBase

- code: "Q103"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    OrderService cần publish event "order.created" lên Kafka sau khi tạo đơn hàng thành công. Bạn viết producer code thế nào?
  expectedAnswer: |-
    Sau khi DB save thành công: Kafka producer.send({topic: "order.created", key: orderId, value: JSON.stringify(orderPayload)}).
    Transactional outbox pattern để tránh lost events: save event vào DB trong cùng transaction, separate process publish lên Kafka.
    Đảm bảo at-least-once delivery.
  scoringGuide: *scoringBase

- code: "Q104"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho đoạn code: OrderService gọi trực tiếp new EmailService().send(). Bạn refactor thế nào để 2 service loosely coupled?
  expectedAnswer: |-
    Options: (1) Message broker — OrderService publish "order.placed", EmailService subscribe.
    (2) Interface + DI — inject INotificationService, EmailService là 1 implementation.
    (3) Webhook/callback.
    Lợi ích message broker: OrderService không biết EmailService tồn tại, dễ thêm service khác subscribe, EmailService down không affect OrderService.
  scoringGuide: *scoringBase

- code: "Q105"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Service Order gọi Inventory để trừ stock. Nếu Inventory down, Order bị block toàn bộ. Bạn thiết kế circuit breaker + fallback strategy thế nào?
  expectedAnswer: |-
    Circuit Breaker (Hystrix/resilience4j): CLOSED → OPEN khi failure rate > threshold → HALF-OPEN để test recovery.
    Fallback: (1) cached last response, (2) default response, (3) queue request for later processing.
    Timeout: 2s để fail fast.
    Bulkhead: isolate Inventory failures không drain OrderService thread pool.
  scoringGuide: *scoringBase

- code: "Q106"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Quy trình đặt hàng span 3 service: trừ stock, tạo đơn, gửi email — cả 3 phải thành công hoặc rollback. Bạn thiết kế Saga pattern (choreography vs orchestration) thế nào?
  expectedAnswer: |-
    Choreography: mỗi service publish event, service tiếp theo subscribe.
    Compensating transactions khi fail (ReservationFailed → RestoreStock event).
    Orchestration: SagaOrchestrator gọi từng service, biết toàn bộ flow, dễ debug.
    Choreography: decoupled nhưng khó trace.
    Orchestration: centralized nhưng single point of logic.
    Outbox pattern cho reliable event publishing.
  scoringGuide: *scoringBase

- code: "Q107"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    3 service cùng cần đọc user profile. Bạn share database giữa các service hay duplicate data? Phân tích trade-off.
  expectedAnswer: |-
    Shared DB: coupling — schema change của UserService break các service khác.
    Phù hợp nếu services cùng team.
    Separate DB + API call: loose coupling, latency, UserService SLA ảnh hưởng tất cả.
    Separate DB + event-driven replication: eventual consistency, services có local copy.
    Best cho microservices: database per service, replicate chỉ data cần thiết (projection).
  scoringGuide: *scoringBase

- code: "Q108"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    API Gateway đang là single point of failure. Bạn thiết kế high-availability cho API Gateway thế nào?
  expectedAnswer: |-
    Multiple Gateway instances behind load balancer.
    Stateless: session state bên ngoài (Redis).
    Health checks: LB chỉ route đến healthy instances.
    Multi-AZ deployment.
    DNS failover.
    Rate limit state: shared via Redis.
    Config: push updates mà không restart (hot reload).
    Monitoring: latency, error rate, throughput.
    Canary releases cho gateway updates.
  scoringGuide: *scoringBase

