  expectedAnswer: |-
    Optimistic locking: version column, UPDATE SET remaining = remaining - 1, version = version + 1 WHERE version = ? AND remaining > 0.
    Retry on conflict.
    Redis atomic: DECR nếu > 0.
    Queue-based: serialize requests qua queue, 1 worker xử lý.
    Database pessimistic: SELECT FOR UPDATE.
    Optimistic + Redis sẽ tốt nhất cho read-heavy, burst traffic.
  scoringGuide: *scoringBase

