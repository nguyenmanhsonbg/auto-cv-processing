  expectedAnswer: |-
    GitOps: Git là source of truth cho infrastructure state.
    Tools: ArgoCD hoặc Flux.
    Flow: developer PR infrastructure change → review → merge → ArgoCD detect drift → auto sync đến cluster.
    No manual kubectl apply.
    Secrets: sealed-secrets hoặc external secrets operator.
    Rollback: git revert PR → auto sync back.
    Audit trail trong git history.
  scoringGuide: *scoringBase

