    Docker compose: docker-compose logs -f service_name.
    Kubectl (K8s): kubectl logs -f pod_name -c container_name | grep ERROR.
    Centralized logging: ship logs đến ELK, search với Kibana.
    Log structured JSON để dễ filter: {level: "ERROR", message: "...", timestamp: "..."}.
  scoringGuide: *scoringBase

- code: "Q161"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
