    Leave it better: boy scout rule.
    Understand importance: production systems matter.
    Find allies: others who care about quality.
  scoringGuide: *scoringBase

- code: "Q213"
  category: PERSONALITY
  subcategory: "Động lực"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
