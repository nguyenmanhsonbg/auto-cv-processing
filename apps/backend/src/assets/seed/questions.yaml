  expectedAnswer: |-
    Hash: HSET session:{sessionId} userId 123 role "admin" expiresAt "...".
    HGET để lấy field cụ thể, HGETALL để lấy toàn bộ. Ưu điểm: partial update không cần serialize/deserialize toàn bộ.
    TTL ở key level.
    String + JSON: đơn giản hơn nhưng phải serialize toàn bộ khi update 1 field.
  scoringGuide: *scoringBase

- code: "Q069"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Tính năng search sản phẩm full-text + filter trên 10 triệu SKU, dưới 200ms. Bạn thiết kế Elasticsearch index mapping, sharding strategy và sync từ DB thế nào?
  expectedAnswer: |-
    Mapping: text fields với custom analyzer (Vietnamese tokenizer), keyword cho filter, numeric cho range.
    Sharding: 5 shards × 2 replicas.
    Sync: CDC với Debezium → Kafka → ES consumer.
    Rollover index cho hot/warm tiers.
    Query: bool query (must: match, filter: term/range) — filter không tính score → faster.
    Caching: search cache cho popular queries.
  scoringGuide: *scoringBase

- code: "Q070"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Service thanh toán nhận 10,000 request/giây nhưng chỉ xử lý 1,000/giây. Bạn thiết kế buffer với message queue thế nào? Xử lý back-pressure và consumer lag thế nào?
  expectedAnswer: |-
    Kafka: producer ghi 10k/s, consumer xử lý 1k/s.
    Consumer lag tăng dần.
    Back-pressure: slow consumer strategy (pause/resume consumer).
    Scale: thêm consumers đến max = số partitions.
    Auto-scaling consumers based on lag.
    Dead letter queue cho failed messages.
    Ordering: cùng userId → cùng partition.
  scoringGuide: *scoringBase

- code: "Q071"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hệ thống cần invalidate cache trên 10 node khi data thay đổi. Bạn thiết kế cache invalidation strategy thế nào?
  expectedAnswer: |-
    Strategies: (1) TTL-based: accept stale data, simple.
    (2) Write-through: update cache và DB đồng thời.
    (3) Event-driven: Pub/Sub khi data thay đổi, all nodes invalidate.
    Redis Pub/Sub cho broadcast.
    (4) Consistent hashing: 1 node own cache key, invalidate 1 node.
    Cân nhắc: eventual consistency vs strong consistency, cost of invalidation.
  scoringGuide: *scoringBase

- code: "Q072"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần chọn giữa Redis Cluster và Redis Sentinel cho production. Phân tích trade-off và đề xuất cho use case cụ thể.
  expectedAnswer: |-
    Sentinel: HA cho single master-replica, automatic failover, không scale writes.
    Dùng khi: cần HA, data fit trên 1 node, không cần horizontal scale.
    Cluster: partitioned, multiple masters, scale writes/memory, cross-slot ops không hỗ trợ.
    Dùng khi: data > 1 node hoặc write throughput cao.
    Cluster phức tạp hơn — evaluate nhu cầu thực trước khi chọn.
  scoringGuide: *scoringBase

