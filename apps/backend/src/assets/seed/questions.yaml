    Jobs downstream (build, deploy) depend-on: test — nếu test fail thì không run.
    Cache node_modules với actions/cache.
    Matrix: test trên nhiều Node versions.
    Upload test results với actions/upload-artifact.
  scoringGuide: *scoringBase

- code: "Q160"
