- code: "Q214"
  category: PERSONALITY
  subcategory: "Động lực"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Mô tả một ngày làm việc bạn thấy thực sự productive và có ý nghĩa.
  expectedAnswer: |-
    Specific: deep work time (flow state), unblocked, clear goal, shipped something meaningful.
    Environment: few interruptions, good tooling.
    Team: productive collaboration.
    Meaning: seeing impact of work.
  scoringGuide: *scoringBase

- code: "Q215"
  category: PERSONALITY
  subcategory: "Động lực"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã trải qua giai đoạn burnout chưa? Bạn nhận ra và handle thế nào?
  expectedAnswer: |-
    Honest: burnout is real and common.
    Recognize signs: fatigue, cynicism, reduced efficacy.
