  expectedAnswer: |-
    Growth mindset: opportunity to learn.
    Break down: học concepts cần thiết trước.
    Ask for help: pair với expert nếu có.
    Time box learning.
    Deliver incrementally.
    Communicate uncertainty: set realistic expectations về timeline.
  scoringGuide: *scoringBase

- code: "Q203"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho ví dụ lần bạn chủ động fix vấn đề kỹ thuật không phải trách nhiệm của mình.
  expectedAnswer: |-
