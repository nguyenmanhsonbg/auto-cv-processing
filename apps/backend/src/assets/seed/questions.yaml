- code: "Q133"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Unit test là gì? Tại sao cần viết? Cho ví dụ lợi ích cụ thể đã giúp bạn trong dự án.
  expectedAnswer: |-
    Unit test: test isolated unit (function/class) với external dependencies mocked.
    Lợi ích: catch bugs sớm, refactor confidence, documentation sống, regression prevention.
    Ví dụ cụ thể: catch edge case khi price = 0 trước khi deploy.
  scoringGuide: *scoringBase

- code: "Q134"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Arrange-Act-Assert pattern là gì? Viết test cho hàm tính discount: nếu tổng > 1 triệu thì giảm 10%.
  expectedAnswer: |-
    Arrange: setup data (price = 1_100_000).
    Act: result = calculateDiscount(price).
    Assert: expect(result).toBe(1_000_000).
    Test case 2: price = 500_000 → 500_000 (no discount).
    Boundary: price = 1_000_000 (edge case).
    Mỗi test 1 assertion focus.
  scoringGuide: *scoringBase

- code: "Q135"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Test coverage 100% có nghĩa là code không có bug không? Tại sao?
  expectedAnswer: |-
    Không.
    Coverage chỉ đo code lines được execute, không đo quality of assertions.
    Ví dụ: test không có assert vẫn tăng coverage.
    Mutation testing đo kỹ hơn.
    100% coverage không cover: logic errors, concurrency bugs, integration issues.
    Better metric: meaningful test cases covering important behaviors.
  scoringGuide: *scoringBase

- code: "Q136"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Viết unit test cho hàm calculateDiscount(price, couponCode): giảm 10% nếu coupon = "VIP10". Test case nào cần có?
  expectedAnswer: |-
    Test cases: (1) Valid coupon "VIP10" → 10% off, (2) Invalid coupon → no discount, (3) Empty/null coupon → no discount, (4) Price = 0 → remain 0, (5) Case sensitivity: "vip10" → tùy business rule.
    Boundary: giảm tối đa.
    Mỗi test case isolate 1 behavior.
  scoringGuide: *scoringBase

- code: "Q137"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Viết unit test cho UserService.register() — cần mock UserRepository và EmailService. Viết ít nhất 3 test case: success, email duplicate, invalid email.
  expectedAnswer: |-
    Test 1 (success): mock repo.findByEmail → null, mock repo.save → user, mock emailService.send → void.
    Assert user returned.
    Test 2 (duplicate): mock findByEmail → existing user.
    Assert throws DuplicateEmailError.
    Test 3 (invalid): pass invalid email.
    Assert throws ValidationError.
    Verify: emailService.send called once on success.
  scoringGuide: *scoringBase

- code: "Q138"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hàm processPayment() gọi external payment API. Bạn test thế nào mà không gọi API thật?
  expectedAnswer: |-
    Mock/stub payment client: inject interface IPaymentClient, test inject mock.
    Mock success scenario: mock returns {status: "SUCCESS", transactionId: "tx123"}.
    Mock failure: returns {status: "FAILED"}.
    Mock timeout: throws TimeoutError.
    Verify: correct fields sent, correct state transitions.
    Never call real API in unit test.
  scoringGuide: *scoringBase

- code: "Q139"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Mock và stub khác nhau thế nào? Cho ví dụ cụ thể khi nào dùng mock, khi nào dùng stub.
  expectedAnswer: |-
    Stub: return giá trị cố định, không verify interactions (emailService.send → void).
    Mock: verify interactions (assert emailService.send called exactly once với đúng args).
    Spy: real implementation nhưng track calls.
    Dùng stub khi cần fake external response.
    Dùng mock khi cần verify side effects (email được gửi).
  scoringGuide: *scoringBase

- code: "Q140"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hàm async fetchUserData() trả về Promise. Bạn viết unit test thế nào?
  expectedAnswer: |-
    Jest: async/await: `it("should return user", async () => { const user = await fetchUserData("1"); expect(user.id).toBe("1"); })`.
    Test error case: `await expect(fetchUserData("invalid")).rejects.toThrow("User not found")`.
    Mock: jest.mock cho HTTP client.
    Không dùng done callback (outdated), prefer async/await.
  scoringGuide: *scoringBase

- code: "Q141"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Test suite 5,000 test chạy 20 phút. Bạn phân tích bottleneck và tối ưu thế nào xuống dưới 5 phút?
  expectedAnswer: |-
    Profiling: jest --verbose để tìm slow tests.
    Bottlenecks: I/O (real DB/Redis), sleeps, no parallelism.
    Fix: (1) jest --maxWorkers=auto parallel execution, (2) mock external I/O, (3) jest --testPathPattern để chạy subset, (4) shared test DB với transaction rollback, (5) identify và fix flaky tests.
    Target: unit tests < 1s each.
  scoringGuide: *scoringBase

- code: "Q142"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Codebase cũ 50k dòng không có test. Bạn lên strategy: bắt đầu từ đâu, ưu tiên gì, target coverage thế nào?
  expectedAnswer: |-
    Prioritize: critical business logic (payment, auth, data integrity).
    Characterization tests trước (describe current behavior).
    Seam injection để test legacy code.
    Coverage: không đặt target % — đặt target theo risk.
    Không test: generated code, framework code, simple getters.
    Boy Scout: mỗi PR thêm test cho code được touch.
    Ratchet: coverage không được giảm.
  scoringGuide: *scoringBase

- code: "Q143"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Integration test vs unit test vs E2E test — bạn phân bổ tỷ lệ thế nào cho một dự án backend API? Tại sao?
  expectedAnswer: |-
    Testing pyramid: 70% unit, 20% integration, 10% E2E.
    Unit: fast, isolated, cheap.
    Integration: test DB/Redis/external service interactions (với test containers).
    E2E: smoke test critical paths.
    Inverted pyramid (many E2E): slow, flaky, expensive.
    Balance: đủ confidence mà không quá chậm.
    Backend API: integration tests quan trọng vì DB interaction là core.
  scoringGuide: *scoringBase

- code: "Q144"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Team mới không ai muốn viết test vì "mất thời gian". Bạn là senior — bạn thuyết phục và introduce test culture thế nào?
  expectedAnswer: |-
    Đừng mandate coverage % ngay.
    Lead by example: pair programming với test.
    Show value: kể bug đã được catch bởi test trong team khác.
    Tooling: easy test setup, fast feedback (watch mode).
    TDD workshop nhẹ.
    Start small: critical paths.
    Measure: track bugs escaped to production, correlate với test coverage.
    Management buy-in: ROI của test vs cost of bugs.
  scoringGuide: *scoringBase

