    Rebase: replay commits on top of target branch, linear history, rewrites commit hashes.
    Dùng rebase: local feature branch trước khi merge (clean history).
    Không rebase: shared/public branches.
    Golden rule: không rebase commits đã push.
  scoringGuide: *scoringBase

