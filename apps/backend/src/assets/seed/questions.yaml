  expectedAnswer: |-
    Distributed tracing: generate traceId tại API Gateway (UUID), inject vào X-Trace-Id header.
    Mỗi service đọc header, pass forward khi gọi downstream.
    Log với traceId.
    OpenTelemetry: tự động propagate context qua W3C Trace Context header.
    Jaeger/Zipkin: collector nhận spans, visualize waterfall.
    Correlation ID để join logs.
  scoringGuide: *scoringBase

- code: "Q165"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
