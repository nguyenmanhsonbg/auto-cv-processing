- code: "Q013"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    4 tính chất của OOP là gì? Giải thích từng tính chất kèm ví dụ thực tế.
  expectedAnswer: |-
    Encapsulation: ẩn nội bộ, expose qua interface (private field + getter/setter).
    Inheritance: tái dùng code qua extends.
    Polymorphism: cùng interface, behavior khác nhau tùy subtype.
    Abstraction: ẩn complexity, chỉ expose cái cần thiết.
  scoringGuide: *scoringBase

- code: "Q014"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Singleton pattern là gì? Viết ví dụ. Thread-safe Singleton implement thế nào?
  expectedAnswer: |-
    Singleton: đảm bảo chỉ có 1 instance.
    Thread-safe: double-checked locking (volatile + synchronized), hoặc dùng static inner class (Bill Pugh), hoặc enum singleton (Java).
    Eager initialization nếu init cost thấp.
  scoringGuide: *scoringBase

- code: "Q015"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Dependency Injection là gì? Cho ví dụ không dùng DI và có dùng DI — sự khác biệt?
  expectedAnswer: |-
    DI: inject dependencies từ bên ngoài thay vì tự tạo.
    Không DI: `new EmailService()` bên trong constructor → tight coupling, khó test.
    Có DI: nhận EmailService qua constructor → loose coupling, dễ mock trong test.
    Framework: Spring, NestJS tự động wire dependencies.
  scoringGuide: *scoringBase

- code: "Q016"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Factory Method và Abstract Factory khác nhau thế nào? Khi nào dùng cái nào?
  expectedAnswer: |-
    Factory Method: 1 method tạo 1 loại object, subclass override để chọn loại cụ thể.
    Abstract Factory: tạo một family of related objects (ví dụ: MacButton + MacDialog vs WindowsButton + WindowsDialog).
    Dùng Factory Method khi cần defer instantiation; Abstract Factory khi cần đảm bảo product family consistent.
  scoringGuide: *scoringBase

- code: "Q017"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần tạo database connection — chỉ cho phép 1 instance duy nhất trong toàn app. Bạn implement Singleton thế nào trong ngôn ngữ của bạn?
  expectedAnswer: |-
    Java: static inner class hoặc enum.
    Go: sync.Once.
    TypeScript/Node: module-level export (module cache đảm bảo 1 instance).
    Key: lazy initialization + thread safety.
    Trong context DI framework (Spring/NestJS): scope = singleton là default — không cần implement thủ công.
  scoringGuide: *scoringBase

- code: "Q018"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn nhận task tích hợp với VNPay SDK. Sau này có thể đổi sang MoMo mà không sửa business code. Bạn viết Adapter/interface thế nào?
  expectedAnswer: |-
    Định nghĩa interface `PaymentGateway` với các method: `createPayment(order)`, `verifyCallback(params)`.
    VNPayAdapter và MoMoAdapter implement interface đó.
    Business code chỉ phụ thuộc vào interface, không biết implementation cụ thể.
    Inject qua constructor/DI.
  scoringGuide: *scoringBase

- code: "Q019"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    UserService cần gửi email sau khi user register. Bạn implement bằng Observer pattern thế nào để UserService không phụ thuộc trực tiếp vào EmailService?
  expectedAnswer: |-
    EventEmitter: UserService emit "user.registered" event.
    EmailService subscribe và handle.
    Hoặc dùng message broker (Kafka/RabbitMQ).
    Lợi ích: UserService không import EmailService.
    Thêm handler mới (analytics, notification) không sửa UserService.
    Nhược: harder to trace flow.
  scoringGuide: *scoringBase

- code: "Q020"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho đoạn code: class UserManager vừa validate input, vừa save DB, vừa send email. Bạn refactor thế nào cho đúng Single Responsibility?
  expectedAnswer: |-
    Tách thành: UserValidator (validate input), UserRepository (save DB), EmailService (send email), UserService (orchestrate).
    Mỗi class có 1 lý do để thay đổi.
    UserService gọi các service khác theo flow, không có logic riêng.
    Kết quả: dễ test riêng từng phần.
  scoringGuide: *scoringBase

- code: "Q021"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Thiết kế plugin system: các team khác có thể tự thêm feature vào platform mà không sửa core code. Bạn định nghĩa interface, loading mechanism và isolation thế nào?
  expectedAnswer: |-
    Plugin interface với lifecycle hooks: `register()`, `init()`, `destroy()`.
    Plugin manifest (name, version, dependencies).
    Dynamic loading: Java ServiceLoader hoặc class loading, Go: build tags hoặc hashicorp/go-plugin.
    Isolation: separate classloader hoặc process.
    Versioning API để backward compat.
    Registry để discover và wire plugins.
  scoringGuide: *scoringBase

- code: "Q022"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Codebase 200k dòng, không test, business logic lẫn infrastructure. Bạn lên kế hoạch refactor về Clean Architecture theo từng giai đoạn thế nào?
  expectedAnswer: |-
    Phase 1: identify bounded contexts, vẽ dependency diagram.
    Phase 2: tách domain entities khỏi framework (xóa annotations DB khỏi domain).
    Phase 3: introduce use cases/interactors.
    Phase 4: invert dependencies (domain không depend infrastructure).
    Mỗi phase có characterization test trước để giữ behavior.
    Strangler fig pattern — không rewrite toàn bộ.
  scoringGuide: *scoringBase

- code: "Q023"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hệ thống dùng Singleton database connection, nhưng trong unit test không thể mock được. Bạn refactor thế nào để testable?
  expectedAnswer: |-
    Extract interface `DatabaseConnection`.
    Singleton implement interface đó.
    Inject interface qua constructor (DI) thay vì gọi static method.
    Test dùng mock implementation.
    Nếu legacy code dùng static method: introduce seam bằng wrapper class.
  scoringGuide: *scoringBase

- code: "Q024"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần thiết kế event system: khi user đăng ký, trigger 5 handler khác nhau (email, analytics, notifications...). Bạn thiết kế thế nào để dễ thêm handler mới mà không sửa registration flow?
  expectedAnswer: |-
    EventBus/EventEmitter pattern: registration code publish "UserRegistered" domain event.
    Handlers subscribe và react.
    Implementations: in-process synchronous (simple), in-process async queue, message broker (Kafka) cho distributed.
    Key: registration code không biết có bao nhiêu handler.
    Thêm handler = thêm subscriber, không sửa publisher.
  scoringGuide: *scoringBase

