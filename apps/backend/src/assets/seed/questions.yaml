  isActive: true
  text: |-
    Cần kiểm tra tự động: không được commit file .env và commit message phải bắt đầu bằng "[JIRA-xxx]". Bạn viết pre-commit hook thế nào?
  expectedAnswer: |-
    .git/hooks/pre-commit: kiểm tra staged files không có .env. commit-msg hook: check message format.
    Chia sẻ trong team: dùng Husky (JS) hoặc lefthook để commit hooks vào repo.
    Không thể skip (vì không control --no-verify ở CI).
    Server-side hook mạnh hơn vì không bypass được.
  scoringGuide: *scoringBase

- code: "Q092"
  category: BACKEND_MUST
  subcategory: "Git/SVN"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cần rollback 1 commit cụ thể đã push lên main (không phải commit mới nhất). Bạn dùng lệnh gì?
  expectedAnswer: |-
    git revert <commit-hash>: tạo commit mới undo changes của commit đó, safe với shared branch.
    Nếu muốn revert nhiều commits: git revert A^..B.
    Không dùng git reset --hard trên main (rewrites shared history → conflicts khi team pull).
    Commit message revert nên giải thích lý do.
  scoringGuide: *scoringBase

- code: "Q093"
  category: BACKEND_MUST
  subcategory: "Git/SVN"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Team 10 người có 3 feature song song, hotfix process và weekly release. Bạn thiết kế branching strategy, PR workflow và merge policy thế nào?
  expectedAnswer: |-
    GitFlow hoặc Trunk-based với feature flags.
    Trunk-based: short-lived branches (<2 ngày), merge vào main thường xuyên, feature flags cho incomplete features.
    PR: require 2 approvals, CI pass, no merge conflicts.
    Hotfix: from main, fast-track review, merge to main + next release.
    Weekly release: tag + changelog.
  scoringGuide: *scoringBase

- code: "Q094"
  category: BACKEND_MUST
  subcategory: "Git/SVN"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Monorepo 30 microservices, CI build toàn bộ mỗi commit mất 1 giờ. Bạn đề xuất giải pháp: affected module detection, caching strategy.
  expectedAnswer: |-
    Affected detection: git diff --name-only từ last successful build, map files → services.
    Chỉ build/test services bị affect.
    Tools: Nx, Turborepo, Bazel (cho fine-grained dep graph).
    Cache: remote build cache (S3/GCS), Docker layer cache.
    Parallel: build độc lập services song song.
    Kết quả: từ 1 giờ xuống 5-10 phút.
  scoringGuide: *scoringBase

- code: "Q095"
  category: BACKEND_MUST
  subcategory: "Git/SVN"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cần introduce feature flags vào git workflow để cho phép deploy code mà chưa enable tính năng. Bạn thiết kế thế nào?
  expectedAnswer: |-
    Feature flag service: DB/config store với key-value pairs.
    Code: if (featureFlags.isEnabled("new-checkout")) { ... }.
    Deploy: merge code, flag OFF.
    Enable: flip flag (no deployment needed).
    User-targeting: enable cho % users hay specific users.
    Tools: LaunchDarkly, Unleash (self-hosted).
    Cleanup: remove flags sau khi fully deployed.
  scoringGuide: *scoringBase

- code: "Q096"
  category: BACKEND_MUST
  subcategory: "Git/SVN"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Team hay xảy ra "works on my machine" — code pass CI nhưng fail trên staging. Bạn setup git/CI workflow thế nào để phát hiện sớm hơn?
  expectedAnswer: |-
    Root causes: env differences, missing env vars, different OS.
    Solutions: (1) Docker trong CI với same image as production, (2) docker-compose cho integration tests với real DB/Redis, (3) Staging env identical to prod (Terraform), (4) Contract testing giữa services, (5) Smoke tests post-deploy.
    Dev containers (devcontainer.json) để standardize local env.
  scoringGuide: *scoringBase

