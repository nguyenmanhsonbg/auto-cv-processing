- code: "Q109"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    JWT hoạt động thế nào? Header, payload, signature — mỗi phần chứa gì và encode thế nào?
  expectedAnswer: |-
    JWT = base64url(header) + "." + base64url(payload) + "." + signature.
    Header: {alg: "HS256", typ: "JWT"}.
    Payload: claims (sub, iat, exp, role).
    Signature: HMAC-SHA256(header.payload, secret) hoặc RS256 với private key.
    Ai cũng đọc được payload (chỉ base64).
    Signature đảm bảo không bị tamper.
    Lưu token ở httpOnly cookie hoặc localStorage (risk XSS).
  scoringGuide: *scoringBase

- code: "Q110"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    SQL injection là gì? Cho ví dụ code dễ bị tấn công và cách fix bằng prepared statement.
  expectedAnswer: |-
    SQLi: inject SQL code qua user input để manipulate query.
    Vulnerable: "SELECT * FROM users WHERE email = '" + email + "'"; input ' OR 1=1 -- → dump all users.
    Fix: prepared statement "WHERE email = ?" với parameterized query.
    ORM tự handle.
    Never concatenate user input vào SQL.
  scoringGuide: *scoringBase

- code: "Q111"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    XSS (Stored, Reflected, DOM-based) và CSRF là 2 loại tấn công khác nhau thế nào? Cách phòng chống?
  expectedAnswer: |-
    XSS: inject script vào trang web, thực thi trong browser victim.
    Stored: lưu vào DB.
    Reflected: trong URL.
    DOM-based: client-side JS.
    Phòng: encode output, CSP header, httpOnly cookie.
    CSRF: trigger action trên behalf của authenticated user từ domain khác.
    Phòng: CSRF token, SameSite cookie, check Origin/Referer header.
  scoringGuide: *scoringBase

- code: "Q112"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    DoS và DDoS khác nhau thế nào? Hệ thống bị DDoS thì triệu chứng là gì?
  expectedAnswer: |-
    DoS: 1 nguồn tấn công.
    DDoS: nhiều nguồn phân tán (botnet).
    Triệu chứng: CPU/memory spike, response time tăng, connection timeout, bandwidth exhaustion, error rate tăng.
    Phòng chống: rate limiting, WAF, CDN (absorb traffic), IP block, CAPTCHA, cloud provider DDoS protection (AWS Shield).
  scoringGuide: *scoringBase

- code: "Q113"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Code review thấy: `query = "SELECT * FROM users WHERE email = '" + email + "'"`. Giải thích nguy cơ và viết lại an toàn.
  expectedAnswer: |-
    Nguy cơ: SQL injection — input `admin'--` bỏ qua password check.
    Fix: prepared statement `SELECT * FROM users WHERE email = $1` với params [email].
    ORM equivalent: `userRepo.findOne({where: {email}})`.
    Cũng nên: validate email format trước, log attempt, rate limit login endpoint.
  scoringGuide: *scoringBase

- code: "Q114"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    API endpoint /login trả về lỗi "Email không tồn tại" vs "Mật khẩu sai" — điều này có vấn đề gì về security không? Sửa thế nào?
  expectedAnswer: |-
    User enumeration attack: attacker biết email nào tồn tại trong system.
    Fix: luôn trả về cùng generic message "Email hoặc mật khẩu không đúng".
    Đồng thời: timing attack — nếu user không tồn tại thì response nhanh hơn, phải ensure constant time response.
    Rate limiting để prevent brute force.
  scoringGuide: *scoringBase

- code: "Q115"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    JWT token của bạn lưu user_id và role trong payload. Ai cũng có thể đọc được payload — điều này có an toàn không? Giải thích.
  expectedAnswer: |-
    An toàn nếu: (1) không lưu sensitive data trong payload (password, PII), (2) signature đảm bảo payload không bị tamper.
    Không an toàn nếu: dùng "alg: none" attack.
    Best practice: verify alg trong header, chỉ accept HS256 hoặc RS256.
    Role trong token: ok nhưng cần verify có match DB không nếu role có thể thay đổi.
  scoringGuide: *scoringBase

- code: "Q116"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cần lưu ANTHROPIC_API_KEY trong ứng dụng. Bạn lưu ở đâu và truyền vào app thế nào mà không hardcode trong code?
  expectedAnswer: |-
    Environment variable: không hardcode trong source code, không commit vào git.
    Prod: Kubernetes secrets, AWS Secrets Manager, HashiCorp Vault → inject as env var. .env file: local dev only, thêm vào .gitignore.
    CI/CD: store trong CI secrets (GitHub Actions secrets).
    Rotate keys thường xuyên.
    Audit access log.
  scoringGuide: *scoringBase

- code: "Q117"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    User logout nhưng JWT còn hiệu lực 1 giờ. Bạn implement token invalidation thế nào? Phân tích trade-off của blacklist vs short-lived token vs refresh token rotation.
  expectedAnswer: |-
    Blacklist: store revoked tokens trong Redis (jti claim), check every request.
    Overhead per request.
    Short-lived (5 min): không cần blacklist, chấp nhận 5-min window.
    Refresh token rotation: access token ngắn (5 min), refresh token dài (7 ngày), rotate refresh token mỗi lần dùng.
    Detect token theft: rotation violation → revoke tất cả.
    Best: short-lived + refresh rotation.
  scoringGuide: *scoringBase

- code: "Q118"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    API bị tấn công rate: 1 IP gửi 10,000 req/phút trên 10 server. Bạn implement distributed rate limiting thế nào mà không cần shared state real-time?
  expectedAnswer: |-
    Redis centralized: atomic Lua script INCR counter với TTL per IP.
    Eventual consistency: local counter per node, sync mỗi giây — accept slight over-limit.
    Token bucket tại Redis.
    Consistent hashing để route cùng IP đến cùng node (sticky).
    WAF/CDN: rate limit tại edge trước khi vào server.
    IP reputation block list.
  scoringGuide: *scoringBase

- code: "Q119"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hệ thống cần lưu credit card number. Bạn thiết kế encryption at rest thế nào? Key management ra sao?
  expectedAnswer: |-
    PCI DSS compliance: tokenization (replace với token, lưu mapping ở vault).
    Encryption: AES-256-GCM.
    Key management: AWS KMS/HashiCorp Vault.
    Key hierarchy: master key → data encryption key (DEK), DEK encrypted bởi master key (envelope encryption).
    Key rotation không cần re-encrypt data (rotate DEK, re-encrypt DEK với new master).
    Never store full PAN — PCI DSS yêu cầu tokenization.
  scoringGuide: *scoringBase

- code: "Q120"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Thiết kế RBAC (Role-Based Access Control) cho hệ thống có 5 role khác nhau với permission hierarchy. Bạn model permission thế nào trong database?
  expectedAnswer: |-
    Tables: roles (id, name), permissions (id, resource, action), role_permissions (role_id, permission_id), user_roles (user_id, role_id).
    Check: user → roles → permissions.
    Permission format: "orders:read", "orders:write", "admin:*".
    Hierarchy: ADMIN inherits MANAGER inherits USER.
    Cache user permissions để tránh query mỗi request.
    ABAC extension: thêm context (owner check).
  scoringGuide: *scoringBase

