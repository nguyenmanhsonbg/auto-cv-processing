- code: "Q233"
  category: BACKEND_MUST
  subcategory: "Cơ sở dữ liệu"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cơ sở dữ liệu lớn nhất bạn từng làm việc có quy mô thế nào (số bản ghi, dung lượng, số request/s)? Bạn đã gặp vấn đề gì và xử lý ra sao?
  expectedAnswer: |-
    Điểm cần có: nêu được con số cụ thể (VD: 500M records, 200GB, 10k RPM), DB engine (PostgreSQL/MySQL/Oracle/MongoDB).
    Vấn đề thường gặp: query chậm → thêm index / rewrite query; table lock → partition / archiving; storage tăng → tiered storage / data archiving.
    Senior+: sharding strategy, read replica, caching layer (Redis), connection pooling (PgBouncer).
    Specialist: thiết kế schema cho time-series hoặc append-only workload, cost optimization.
  scoringGuide: *scoringBase

- code: "Q234"
  category: BACKEND_MUST
  subcategory: "Cơ sở dữ liệu"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể về một câu query chậm trên production bạn đã tối ưu. Bạn phân tích nguyên nhân và fix thế nào? Kết quả cải thiện bao nhiêu?
  expectedAnswer: |-
    Quy trình: dùng EXPLAIN / EXPLAIN ANALYZE xem execution plan; xác định Seq Scan, bad join order, missing index.
    Fix phổ biến: thêm index đúng cột (WHERE / JOIN / ORDER BY), rewrite subquery thành JOIN, tránh SELECT *, thêm phân trang.
    Senior+: covering index, partial index, query hint, materialized view, denormalization có chủ đích.
    Kết quả phải có số đo: từ X giây → Y ms, tải DB giảm Z%.
  scoringGuide: *scoringBase

