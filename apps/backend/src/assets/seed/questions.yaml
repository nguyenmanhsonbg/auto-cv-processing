  expectedAnswer: |-
    Phase 1: dual-write — app ghi vào cả 2 DB, đọc từ MySQL.
    Phase 2: backfill — migrate historical data với batching (100k rows/batch), verify checksums.
    Phase 3: flip read sang PostgreSQL.
    Phase 4: stop write to MySQL.
    Rollback: giữ MySQL sync cho đến khi confident.
