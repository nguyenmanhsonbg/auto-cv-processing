  expectedAnswer: |-
    Check Redis: GET user:{id}.
    Miss: query DB, serialize to JSON, SET user:{id} value EX 300.
    Hit: deserialize JSON → return.
    Invalidation: khi user update, DEL user:{id}.
    Error handling: nếu Redis down → fallback to DB, không throw error.
    Connection pool qua client library.
  scoringGuide: *scoringBase

- code: "Q068"
