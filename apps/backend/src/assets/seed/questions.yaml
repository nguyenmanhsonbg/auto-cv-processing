- code: "Q025"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Mô tả QuickSort: cách hoạt động và độ phức tạp best/average/worst case là bao nhiêu?
  expectedAnswer: |-
    QuickSort: chọn pivot, partition array (< pivot trái, > pivot phải), đệ quy hai phần.
    Best/Average: O(n log n).
    Worst: O(n²) khi pivot là min/max (đã sorted array).
    Fix worst case: random pivot, median-of-3.
    In-place, space O(log n) cho call stack.
  scoringGuide: *scoringBase

- code: "Q026"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Binary Search Tree là gì? Mô tả thao tác insert và search.
  expectedAnswer: |-
    BST: node trái < node hiện tại < node phải.
    Search O(log n) balanced, O(n) worst case (degenerate).
    Insert: traverse theo quy tắc BST, thêm vào leaf.
    Balanced BST: AVL, Red-Black tree để đảm bảo O(log n) luôn.
  scoringGuide: *scoringBase

- code: "Q027"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    HashMap hoạt động thế nào nội bộ? Khi hai key có cùng hash thì xử lý thế nào?
  expectedAnswer: |-
    HashMap: hash(key) → bucket index → lưu entry.
    Collision: separate chaining (LinkedList/TreeNode tại mỗi bucket) hoặc open addressing (linear/quadratic probing).
    Java HashMap: dùng linked list, khi chain dài > 8 → convert sang TreeNode O(log n).
    Load factor 0.75 để balance memory và performance.
  scoringGuide: *scoringBase

- code: "Q028"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Stack và Queue khác nhau thế nào? Cho ví dụ ứng dụng thực tế mỗi loại.
  expectedAnswer: |-
    Stack: LIFO — function call stack, undo/redo, parsing expressions (brackets check), DFS.
    Queue: FIFO — message queue, BFS, task scheduling, print queue.
    Deque: double-ended, có thể dùng như cả hai.
  scoringGuide: *scoringBase

- code: "Q029"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho mảng [3,1,4,1,5,9,2,6] — viết hàm tìm 2 số có tổng = 10. Bạn giải thế nào? Độ phức tạp?
  expectedAnswer: |-
    Brute force O(n²): 2 vòng lặp lồng nhau.
    Optimal O(n): dùng HashSet, với mỗi phần tử x check xem (10-x) có trong set không.
    O(n) time, O(n) space.
    Nếu array đã sorted: two-pointer O(n) time O(1) space.
  scoringGuide: *scoringBase

- code: "Q030"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần cache kết quả của 100 API call gần nhất. Khi cache đầy, phần tử cũ nhất bị xóa. Bạn dùng cấu trúc dữ liệu gì?
  expectedAnswer: |-
    LRU Cache: HashMap + DoublyLinkedList.
    HashMap: O(1) lookup, LinkedList maintain insertion order.
    Khi đầy xóa tail (oldest).
    Khi access: move to head.
    Java: LinkedHashMap với accessOrder=true.
    Redis: key với TTL hoặc volatile-lru eviction policy.
  scoringGuide: *scoringBase

- code: "Q031"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hàm lấy user từ DB đang được gọi 1,000 lần/giây với cùng userId. Bạn tối ưu thế nào?
  expectedAnswer: |-
    In-memory cache với TTL.
    Nếu multi-instance: Redis cache.
    Cache-aside pattern: check cache → hit? return; miss → query DB → store in cache → return.
    Invalidation: khi user update.
    Thundering herd: mutex/semaphore cho đợt cache miss đầu tiên.
    Cache stampede protection: probabilistic early expiration.
  scoringGuide: *scoringBase

- code: "Q032"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
