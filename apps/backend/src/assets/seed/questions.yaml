- code: "Q061"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Elasticsearch dùng để làm gì? Inverted index là gì và tại sao giúp full-text search nhanh hơn SQL LIKE?
  expectedAnswer: |-
    ES: distributed search & analytics engine.
    Inverted index: map từ term → list of documents chứa term (ngược với forward index).
    SQL LIKE '%keyword%': full table scan O(n).
    ES inverted index: lookup term → document list O(1) lookup.
    Analyzer: tokenization, normalization, stemming.
  scoringGuide: *scoringBase

- code: "Q062"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kafka và RabbitMQ khác nhau thế nào? Khi nào dùng Kafka, khi nào dùng RabbitMQ?
  expectedAnswer: |-
    Kafka: log-based, consumer giữ offset, message persist, replay được, throughput cao, partitioned.
    RabbitMQ: broker-based, message bị xóa sau khi consume, flexible routing (exchanges), message ordering per queue.
    Dùng Kafka: event streaming, audit log, replay, high throughput.
    Dùng RabbitMQ: task queues, routing phức tạp, low latency.
  scoringGuide: *scoringBase

- code: "Q063"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Redis có thể dùng để làm gì? Liệt kê 3 data structure và use case mỗi loại.
  expectedAnswer: |-
    String: cache key-value, counter (INCR).
    Hash: user session (HSET user:{id} field value).
    Sorted Set: leaderboard (ZADD), rate limiting.
    List: message queue (LPUSH/RPOP), recent activity.
    Set: unique visitors, tags.
    Pub/Sub: real-time notifications.
  scoringGuide: *scoringBase

- code: "Q064"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cache-aside pattern: describe flow khi cache miss và cache hit.
  expectedAnswer: |-
    Cache hit: check cache → found → return.
    Cache miss: check cache → not found → query DB → store in cache với TTL → return.
    Application quản lý cache (không phải cache tự load).
    Eviction: TTL expiry hoặc LRU.
    Thundering herd: nếu cache expire cùng lúc nhiều request, dùng mutex hoặc jitter TTL.
  scoringGuide: *scoringBase

- code: "Q065"
  category: BACKEND_MUST
