- code: "Q201"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
