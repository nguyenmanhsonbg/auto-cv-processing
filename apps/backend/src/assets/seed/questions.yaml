  expectedAnswer: |-
    Atomicity: tất cả hoặc không gì (chuyển tiền: trừ A + cộng B).
    Consistency: dữ liệu luôn valid (balance >= 0).
    Isolation: transaction song song không thấy dữ liệu trung gian của nhau.
    Durability: đã commit thì persist dù server crash (WAL log).
    Isolation levels: READ_UNCOMMITTED → SERIALIZABLE.
  scoringGuide: *scoringBase

- code: "Q040"
  category: BACKEND_MUST
  subcategory: "Cơ sở dữ liệu"
