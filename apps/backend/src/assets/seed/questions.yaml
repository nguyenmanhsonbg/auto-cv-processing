  expectedAnswer: |-
    Kỹ thuật cơ bản: chạy migration trong maintenance window, backup trước khi chạy, kiểm tra rollback script.
    Experienced+: expand-contract pattern (thêm cột mới → backfill → chuyển code → xóa cột cũ), batched backfill tránh lock toàn bảng, feature flag.
    Senior+: online DDL (pt-online-schema-change, gh-ost cho MySQL; pg_repack cho PostgreSQL), dual-write + shadow table.
    Specialist: zero-downtime migration với blue-green deploy, kiểm chứng bằng canary traffic.
  scoringGuide: *scoringBase

