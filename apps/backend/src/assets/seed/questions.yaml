  scoringGuide: *scoringBase

- code: "Q216"
  category: PERSONALITY
  subcategory: "Động lực"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Điều gì khiến bạn quyết định rời công ty trước? (nếu applicable)
