  expectedAnswer: |-
    Process: isolated memory space.
    Thread: share memory space với các thread khác trong cùng process.
    Goroutine: lightweight (2KB stack), managed by Go runtime, M:N scheduling (nhiều goroutine trên ít OS thread).
    Tạo 1 triệu goroutine OK; 1 triệu OS thread → OOM.
    Context switch goroutine nhanh hơn OS thread.
  scoringGuide: *scoringBase

- code: "Q053"
