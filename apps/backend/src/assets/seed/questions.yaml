- code: "Q217"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: ARCHITECTURE
  isActive: true
  text: |-
    Vẽ kiến trúc high-level cho hệ thống e-commerce: Client → API Gateway → các service (Order, Product, User, Payment) → Message Queue → Database. Thêm luồng khi user đặt hàng và khi thanh toán thành công.
  expectedAnswer: |-
    Client → API Gateway → Auth → OrderService/ProductService/UserService/PaymentService.
    OrderService gọi Inventory, publish event "order.created" lên Kafka.
    PaymentService consume event, process payment, publish "payment.success".
    NotificationService subscribe events.
    Mỗi service có DB riêng.
    Circuit breaker giữa services.
  scoringGuide: |-
    1: Không vẽ được diagram có nghĩa.
    2: Vẽ được flow cơ bản nhưng thiếu message queue và async flow.
    3: Vẽ đầy đủ với async event flow, service isolation.
    4: Thêm resilience patterns (circuit breaker, retry), data consistency (saga), monitoring layer.
  architectureTemplate:
    name: "E-commerce Order Flow"
    nodes:
      - {id: client, label: Client, x: 50, y: 200, type: client}
      - {id: gateway, label: API Gateway, x: 250, y: 200, type: service}
    connections:
      - {from: client, to: gateway, label: HTTPS, lineType: forward}

- code: "Q218"
  category: BACKEND_MUST
  subcategory: "Cơ sở dữ liệu"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: ARCHITECTURE
  isActive: true
  text: |-
    Thiết kế database architecture cho mạng xã hội có 100 triệu user: users, posts, likes, follows, comments. Read-heavy 99%. Vẽ diagram gồm: primary DB, read replicas, cache layer, search index.
  expectedAnswer: |-
    PostgreSQL primary cho writes.
    3+ read replicas cho reads.
    Redis cache cho hot data (user profile, popular posts).
    Elasticsearch cho full-text search.
    CDN cho media.
    Timeline: fan-out on write vs fan-out on read.
    Sharding strategy cho follows/timeline tables.
  scoringGuide: |-
    1: Chỉ vẽ 1 database.
    2: Vẽ được primary + replica.
    3: Đầy đủ với cache, search index, phân tích read/write path.
    4: Thêm sharding strategy, CDN, data model cho scale 100M users.
