  expectedAnswer: |-
    Identify: track test pass/fail history, flag tests với inconsistent results.
    Quarantine: @flaky annotation, run separately, không block merge.
    Fix: root cause (race condition, shared state, time dependency, external API).
    Long-term: strict no-new-flaky policy, fix budget (20% capacity), flakiness as technical debt.
    Measure: flaky rate as KPI.
  scoringGuide: *scoringBase

- code: "Q166"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Thiết kế observability strategy cho 50 microservices: centralized logging, metrics aggregation, end-to-end tracing, alert routing. Tool stack và cost optimization thế nào?
  expectedAnswer: |-
    Logs: Fluentbit → Loki (cost effective) hoặc Elasticsearch.
    Metrics: Prometheus + Grafana.
    Traces: OpenTelemetry → Jaeger (self-hosted) hoặc Tempo.
    Alerts: AlertManager → PagerDuty.
    Cost: log sampling cho debug, metrics retention tiers (hot 7d, warm 30d, cold 1y).
    Cardinality control.
    Shared observability platform team cho 50 services.
  scoringGuide: *scoringBase

- code: "Q167"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
