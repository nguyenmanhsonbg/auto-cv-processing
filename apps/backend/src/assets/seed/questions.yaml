    Reflect: root cause.
    Learn: process change to prevent recurrence.
    Share: blameless post-mortem với team.
    Growth: turned failure into improvement.
  scoringGuide: *scoringBase

- code: "Q202"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
