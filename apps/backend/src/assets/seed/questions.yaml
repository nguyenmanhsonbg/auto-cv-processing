  expectedAnswer: |-
    WaitGroup (Go): Add(n) → launch n goroutines, mỗi goroutine Done() khi xong, main goroutine Wait() đến khi tất cả Done.
    Ví dụ: gọi 5 external API song song, chờ tất cả xong.
    CountDownLatch (Java): tương tự — countdown từ n về 0, await() block cho đến 0.
  scoringGuide: *scoringBase

- code: "Q052"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
