    Mô tả được: số services, cách chia bounded context (domain-driven), giao tiếp sync (REST/gRPC) vs async (message queue: Kafka/RabbitMQ).
    Quyết định quan trọng: API gateway, service discovery (Consul/k8s DNS), centralized logging/tracing (ELK, Jaeger/Zipkin), auth propagation (JWT).
    Senior+: saga pattern, event sourcing, deployment strategy (Kubernetes, Helm), health check / circuit breaker (Resilience4j/Hystrix).
    Điểm cộng: nêu được bài học rút ra, trade-off so với monolith (network latency, distributed transaction, operational complexity).
  scoringGuide: *scoringBase

- code: "Q237"
  category: BACKEND_MUST
  subcategory: "Microservices"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng xử lý vấn đề data consistency giữa các microservices chưa? Mô tả tình huống cụ thể và giải pháp bạn áp dụng.
  expectedAnswer: |-
    Tình huống điển hình: đặt hàng thành công nhưng payment / inventory service fail; duplicate event do retry; partial failure giữa các bước.
    Giải pháp: Saga pattern (choreography dùng event, orchestration dùng orchestrator), outbox pattern (đảm bảo at-least-once delivery), idempotency key tránh double-process.
    Senior+: compensating transaction, two-phase commit (và lý do tránh dùng), eventual consistency — phân tích khi nào chấp nhận được.
    Specialist: CQRS + event sourcing, conflict-free replicated data types (CRDT) cho use-case cụ thể.
  scoringGuide: *scoringBase

- code: "Q238"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Mô tả sự cố production nghiêm trọng nhất bạn từng tham gia xử lý. Nguyên nhân gốc rễ là gì, bạn debug ra sao và đã làm gì để phòng tránh lần sau?
  expectedAnswer: |-
    Kể được timeline rõ ràng: phát hiện (alert / user report) → triage (severity, impact) → isolate (rollback / feature flag / scale) → fix → postmortem.
    Công cụ: monitoring (Prometheus/Grafana), log aggregation (ELK/Loki), distributed tracing (Jaeger).
    Root cause analysis: 5 Whys hoặc fishbone diagram.
    Prevention: thêm alert rule, circuit breaker, chaos testing, runbook / on-call playbook.
    Senior+: chủ động dẫn dắt incident, giao tiếp với stakeholder (status page, war-room update), blameless postmortem.
  scoringGuide: *scoringBase

- code: "Q239"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng điều tra và xử lý vấn đề hiệu năng hệ thống trên production chưa? Quy trình của bạn là gì và kết quả đạt được?
  expectedAnswer: |-
    Quy trình: đo baseline (latency P95/P99, throughput RPS, error rate, resource utilization) → tái hiện → profiling → xác định bottleneck → fix → đo lại.
    Bottleneck thường gặp: DB N+1 query, thiếu cache, thread/connection pool exhaustion, GC pressure (JVM), blocking I/O, payload quá lớn.
    Công cụ: APM (Datadog/New Relic/SkyWalking), async-profiler / py-spy, jstack, Flame Graph.
    Kết quả cần có số cụ thể: latency từ X ms → Y ms, throughput tăng Z%, CPU giảm W%.
    Senior+: capacity planning dựa trên load test (Gatling/k6/JMeter), SLA/SLO definition.
  scoringGuide: *scoringBase

- code: "Q240"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng gặp race condition hoặc deadlock trên môi trường production chưa? Bạn phát hiện vấn đề đó thế nào và xử lý ra sao?
  expectedAnswer: |-
    Race condition: nhiều thread/process cùng đọc-sửa-ghi một resource mà không có đồng bộ hóa → kết quả không xác định.
    Phát hiện: log bất thường (giá trị sai, duplicate entry), tái hiện bằng load test, thread dump / heapdump phân tích.
    Fix race condition: synchronized block, ReentrantLock, atomic operations (AtomicInteger, compareAndSwap), immutable object, actor model.
    Deadlock: hai thread chờ nhau giải phóng lock → hệ thống treo.
    Fix deadlock: lock ordering nhất quán, tryLock với timeout, giảm scope lock, dùng concurrent collection thay manual sync.
    Senior+: lock-free data structures, optimistic locking (DB version field), transaction isolation level tuning.
  scoringGuide: *scoringBase

- code: "Q241"
  category: BACKEND_MUST
  subcategory: "Lập trình an toàn"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng phát hiện hoặc vá một lỗ hổng bảo mật trong hệ thống thực tế chưa? Mô tả tình huống, cách phát hiện và cách khắc phục.
  expectedAnswer: |-
    Loại lỗ hổng phổ biến: SQL Injection, XSS, IDOR (Insecure Direct Object Reference), broken authentication, secrets lộ trong log/env/git.
    Phát hiện: code review, penetration test, SAST/DAST tool (SonarQube, OWASP ZAP, Burp Suite), bug bounty report, security audit.
    Fix SQL Injection: parameterized query / prepared statement, ORM, validate input.
    Fix XSS: escape output, Content-Security-Policy header, sanitize input.
    Fix IDOR: authorization check mọi resource access, không dùng sequential ID.
    Senior+: threat modeling, defense-in-depth, security regression test, CVSS scoring để ưu tiên fix.
    Điểm cộng: nêu được bài học về secure-by-default và shift-left security.
  scoringGuide: *scoringBase

- code: "Q242"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể về một lần bạn đánh giá và lựa chọn technology hoặc thư viện cho dự án. Tiêu chí bạn dùng là gì và kết quả thế nào?
  expectedAnswer: |-
    Tiêu chí đánh giá: performance benchmark, community & ecosystem (GitHub stars, issue activity, release cadence), learning curve, license, vendor lock-in, security track record, team familiarity.
    Quy trình: PoC / spike để đo thực tế, so sánh ít nhất 2–3 lựa chọn, ghi lại ADR (Architecture Decision Record).
    Kết quả: nêu được công nghệ đã chọn, lý do cụ thể, và điều gì đã diễn ra đúng/sai kỳ vọng sau khi deploy.
    Senior+: xem xét cả total cost of ownership (migration cost, training, long-term maintenance), tác động đến delivery timeline.
  scoringGuide: *scoringBase

- code: "Q243"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng refactor hoặc migrate một hệ thống legacy chưa? Cách tiếp cận, những thách thức gặp phải và kết quả đạt được?
  expectedAnswer: |-
    Thách thức điển hình: thiếu test coverage, tài liệu lỗi thời, business logic ẩn trong code cũ, không thể dừng hệ thống.
    Cách tiếp cận: viết characterization test (golden master) trước khi refactor, strangler fig pattern (thay dần từng module), feature flag để chuyển traffic dần.
    Quản lý rủi ro: rollback plan, shadow mode (chạy song song cả old và new, so sánh output), canary release.
    Kết quả đo được: giảm technical debt, cải thiện test coverage, deployment frequency tăng.
    Senior+: dẫn dắt team trong quá trình migration, quản lý expectation với stakeholder về timeline và rủi ro.
  scoringGuide: *scoringBase

- code: "Q244"
  category: BACKEND_MUST
  subcategory: "OOP + Design Pattern"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể về một lần bạn áp dụng design pattern để giải quyết bài toán thực tế. Pattern đó giúp ích như thế nào và có trade-off gì không?
  expectedAnswer: |-
    Mô tả rõ bài toán trước khi áp dụng pattern: code lặp, khó mở rộng, tight coupling, khó test.
    Pattern phổ biến và use case: Strategy (thay đổi thuật toán runtime), Observer/Event (decoupling notification), Factory/Builder (tạo object phức tạp), Repository (tách data access), Decorator (thêm behavior không sửa class gốc), Circuit Breaker (fault tolerance).
    Trade-off trung thực: thêm abstraction layer → khó đọc hơn nếu dùng quá mức (over-engineering), thêm boilerplate code.
    Kết quả: code dễ test hơn (mock), dễ mở rộng, giảm bug khi thêm feature mới.
    Senior+: biết khi nào KHÔNG nên dùng pattern — YAGNI principle.
  scoringGuide: *scoringBase

- code: "Q245"
  category: BACKEND_SHOULD
  subcategory: "Agile/Scrum"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã làm việc trong môi trường Agile/Scrum chưa? Kể về một sprint hoặc release khó khăn nhất bạn từng trải qua — team đã xử lý thế nào?
  expectedAnswer: |-
    Tình huống khó: scope creep giữa sprint, dependency bị block, team member nghỉ đột ngột, technical debt cản trở velocity, stakeholder thay đổi priority liên tục.
    Cách xử lý: re-prioritize backlog với Product Owner, break task nhỏ hơn để unblock, swap item ra khỏi sprint, tăng cường daily standup để phát hiện blocker sớm.
    Retrospective: identify root cause, action item cụ thể cho sprint tiếp theo, không blame cá nhân.
    Senior+: chủ động escalate risk sớm, negotiate scope thay vì overtime, bảo vệ team khỏi áp lực ngoài.
    Điểm cộng: nêu được bài học áp dụng vào sprint sau và kết quả cải thiện.
  scoringGuide: *scoringBase

- code: "Q246"
  category: BACKEND_SHOULD
  subcategory: "Unit test"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng viết test cho một module phức tạp hoặc cải thiện test coverage cho một codebase thiếu test chưa? Chiến lược và kết quả thế nào?
  expectedAnswer: |-
    Chiến lược tăng coverage: ưu tiên test các module business logic cốt lõi và bug-prone trước, không nhắm 100% coverage một cách mù quáng.
    Kỹ thuật: test pyramid (unit nhiều nhất, integration ít hơn, E2E ít nhất), test doubles (mock/stub/spy) để isolate, parameterized test cho nhiều case.
    Module phức tạp: dùng characterization test để pin behavior hiện tại trước khi refactor, test behavior không test implementation.
    CI integration: chạy test trên mọi PR, fail build nếu coverage giảm dưới ngưỡng, mutation testing (PIT/Stryker) để đo test quality.
    Senior+: test strategy document, balance giữa test effort và business value, dạy team viết testable code (dependency injection, small functions).
  scoringGuide: *scoringBase

- code: "Q247"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng xây dựng hoặc cải thiện CI/CD pipeline cho team chưa? Bạn thay đổi gì và pipeline đó giúp ích như thế nào?
  expectedAnswer: |-
    Trước khi cải thiện: build thủ công, deploy không nhất quán, hotfix mất nhiều giờ, không có automated test gate.
    Các bước pipeline điển hình: lint → unit test → build → integration test → security scan (SAST/SCA) → Docker build → push registry → deploy staging → smoke test → promote production.
    Kết quả đo được: deployment frequency tăng, lead time giảm, mean time to recovery (MTTR) cải thiện, số lỗi production do deploy giảm.
    Công cụ: GitLab CI, GitHub Actions, Jenkins, ArgoCD (GitOps), Helm.
    Senior+: environment promotion strategy, rollback automation, deployment metrics (DORA metrics), self-service deployment cho dev team.
  scoringGuide: *scoringBase

- code: "Q248"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng chuyển đổi từ ngôn ngữ lập trình này sang ngôn ngữ khác trong dự án thực tế chưa? Những khó khăn bạn gặp và cách bạn vượt qua?
  expectedAnswer: |-
    Tình huống điển hình: migrate từ PHP/Python sang Go/Java vì hiệu năng; từ Java sang Kotlin vì productivity; từ JavaScript sang TypeScript vì type safety.
    Khó khăn: paradigm shift (OOP → functional, dynamic → static typing), ecosystem khác nhau (package manager, testing framework, IDE), team cần upskill đồng thời vẫn deliver.
    Cách vượt qua: học qua dự án thực tế nhỏ trước, pair programming, code review kỹ hơn giai đoạn đầu, tận dụng pattern đã biết rồi học idiom mới của ngôn ngữ.
    Senior+: xây dựng internal guidelines / style guide cho ngôn ngữ mới, knowledge sharing session, nhận diện anti-pattern mang từ ngôn ngữ cũ sang.
    Điểm cộng: nêu được sự khác biệt tư duy giữa hai ngôn ngữ, không chỉ syntax.
  scoringGuide: *scoringBase

- code: "Q249"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể về dự án hoặc tính năng kỹ thuật bạn tự hào nhất trong sự nghiệp. Bạn đóng góp gì, đối mặt với thách thức gì và học được gì từ đó?
  expectedAnswer: |-
    Mô tả rõ context: quy mô dự án, vai trò của ứng viên, business impact.
    Thách thức kỹ thuật cụ thể: deadline gấp, requirement mơ hồ, technical uncertainty, teamwork khó khăn.
    Đóng góp cá nhân: không chỉ nói "team làm" — phân biệt được contribution của bản thân.
    Bài học: kỹ thuật (pattern mới, tool, architecture) lẫn soft skill (communication, estimation, decision under pressure).
    Chỉ số thành công: nêu được kết quả đo được — user adoption, performance improvement, business outcome.
    Senior+: mentoring người khác trong dự án, ra quyết định kỹ thuật dưới áp lực, xây dựng culture tốt trong team.
  scoringGuide: *scoringBase

- code: "Q250"
  category: BACKEND_MUST
  subcategory: "Tech stack"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn đã từng thiết kế hoặc tham gia xây dựng hệ thống chịu tải cao (high-traffic)? Kiến trúc, chiến lược scaling và những bottleneck bạn đã xử lý là gì?
  expectedAnswer: |-
    Quy mô cần nêu: concurrent users, RPS/TPS, peak traffic so với average, SLA (uptime, latency).
    Horizontal scaling: stateless service + load balancer, auto-scaling (k8s HPA, AWS ASG).
    Caching strategy: CDN (static asset), application cache (Redis), DB query cache, cache invalidation strategy (TTL, event-driven).
    Database scaling: read replica cho read-heavy, connection pool, query optimization, eventual sharding.
    Async processing: queue (Kafka/RabbitMQ/SQS) cho non-critical path, background worker, rate limiting.
    Senior+: capacity planning (load test → identify saturation point → provision headroom), chaos engineering để verify resilience.
    Specialist: global distribution (multi-region), consistent hashing, CQRS + event sourcing cho write-heavy workload.
  scoringGuide: *scoringBase
