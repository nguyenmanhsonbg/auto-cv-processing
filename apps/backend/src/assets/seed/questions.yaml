- code: "Q058"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Thiết kế job queue gửi 1 triệu email/ngày: at-least-once delivery, retry on failure, không duplicate send. Bạn thiết kế worker pool, retry policy và idempotency thế nào?
  expectedAnswer: |-
    Message broker (Kafka/RabbitMQ): persistent queue.
    Workers: fan-out, ack sau khi send thành công.
    Retry: exponential backoff (1s, 2s, 4s, 8s), max 3 retries → dead letter queue.
    Idempotency key: hash(userId + template + date) → Redis check trước khi send.
