    Index mapping: {name: {type: text, analyzer: standard}, description: {type: text}, price: {type: float}}.
    Sync: CDC từ DB hoặc application-level dual write.
    Search: multi_match query trên name + description với boost.
    Suggest: completion suggester cho autocomplete.
    10k records: PostgreSQL full-text search cũng OK, ES cho 1M+.
