- code: "Q039"
  category: BACKEND_MUST
  subcategory: "Cơ sở dữ liệu"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
