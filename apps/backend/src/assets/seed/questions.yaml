  scoringGuide: *scoringBase

- code: "Q204"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Deadline cực gấp, phải chọn: ship nhanh nhưng code xấu, hay delay để làm đúng. Bạn chọn thế nào và communicate ra sao?
  expectedAnswer: |-
    Context matters: critical deadline (launch, compliance) → ship with documented tech debt + immediate plan to fix.
    Non-critical → negotiate timeline.
    Communicate trade-offs clearly to stakeholder.
    Never ship silently poor quality.
    Document: "This was intentional shortcut, tracked in issue #X".
  scoringGuide: *scoringBase

- code: "Q205"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Manager ra quyết định kỹ thuật bạn thấy sai. Bạn phản ứng thế nào?
  expectedAnswer: |-
    Speak up respectfully: share concern với data/reasoning.
    Choose right channel: 1-on-1, không call out in public.
    Disagree and commit sau khi đã nói: nếu decision final, execute fully.
    Escalate nếu ethical/safety issue.
    Document concern: cover yourself.
  scoringGuide: *scoringBase

- code: "Q206"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Nhận performance review: "cần cải thiện kỹ năng communication". Bạn phản ứng và action plan thế nào?
  expectedAnswer: |-
    Receive feedback openly.
    Ask for specifics: what situations, what behavior.
    Thank for honesty.
    Create action plan: book, course, practice.
    Pair with someone good at it.
    Request follow-up check-in in 3 months.
    Show improvement visibly.
  scoringGuide: *scoringBase

- code: "Q207"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể lần làm việc trong môi trường requirement cực kỳ ambiguous, không có document. Bạn xử lý thế nào?
  expectedAnswer: |-
    Embrace ambiguity as normal.
    Ask targeted questions: narrow down uncertainty quickly.
    State assumptions explicitly in code/PR.
    Build incrementally: get feedback early.
    Document as you go.
    Validate with stakeholder before building wrong thing.
  scoringGuide: *scoringBase

- code: "Q208"
  category: PERSONALITY
  subcategory: "Phẩm chất"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể về conflict với teammate về code approach. Diễn ra thế nào và kết quả?
  expectedAnswer: |-
    Separate person from idea: critique approach, not person.
    Seek to understand their reasoning first.
    Find common ground: shared goal.
    Data-driven resolution: prototype/benchmark.
    Escalate nếu blocking progress.
    Relationship preservation: disagree professionally, move forward as team.
  scoringGuide: *scoringBase

