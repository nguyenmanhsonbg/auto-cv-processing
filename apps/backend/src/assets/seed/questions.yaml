- code: "Q185"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn viết weekly progress report như thế nào? Nội dung gồm những gì?
  expectedAnswer: |-
    Sections: Done this week, In progress, Next week, Blockers.
    Metrics: story points, bugs fixed, PR merged.
    Concise: bullet points, không essay.
    Audience-appropriate: technical detail cho lead, business impact cho manager.
  scoringGuide: *scoringBase

- code: "Q186"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Sprint bị delay 1 tuần so với kế hoạch. Bạn báo cáo lên manager thế nào?
  expectedAnswer: |-
    Sớm, không chờ đến deadline.
    Content: what is delayed, root cause, impact, plan to recover.
    No surprises principle.
    Options: scope cut, extend, add resource.
    Recommendation.
    Không sugarcoat, không alarmist.
  scoringGuide: *scoringBase

- code: "Q187"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hệ thống bị incident 2 giờ. Bạn viết post-mortem thế nào để team học được từ đó?
  expectedAnswer: |-
    Blameless post-mortem: timeline, root cause (5 whys), contributing factors, impact, action items với owner+due date.
    Không blame cá nhân.
    Share với toàn team.
    Follow up: close action items, measure improvement.
    Culture of learning.
  scoringGuide: *scoringBase

- code: "Q188"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn document một quyết định kỹ thuật quan trọng (ví dụ chọn database) bằng ADR thế nào?
  expectedAnswer: |-
    ADR (Architecture Decision Record): title, status (proposed/accepted/deprecated), context (why decision needed), decision (what chosen), consequences (pros/cons).
    Version controlled trong repo.
    Template: Michael Nygard ADR format.
    Index file để navigate.
    Update khi superseded.
  scoringGuide: *scoringBase

- code: "Q189"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Khi nào bạn dùng dashboard (Grafana, Datadog) và khi nào viết narrative report?
  expectedAnswer: |-
    Dashboard: ongoing monitoring, real-time data, recurring review meetings.
    Narrative report: one-time analysis, stakeholder communication, explain "why" behind numbers, executive summary.
    Combine: dashboard + brief narrative với key insights và recommendations.
  scoringGuide: *scoringBase

- code: "Q190"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Report tiến độ cho technical lead vs cho business stakeholder — bạn điều chỉnh nội dung thế nào?
  expectedAnswer: |-
    Tech lead: technical details, code quality metrics, architecture decisions, blockers.
    Business stakeholder: % complete, business impact, risks, timeline, budget.
    Common: status, risks, next steps.
    Remove jargon cho business audience.
    Lead với headline, details below.
  scoringGuide: *scoringBase

- code: "Q191"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn track và communicate technical debt lên management để được allocate time thế nào?
  expectedAnswer: |-
    Quantify: risk (production incidents caused), cost (developer time wasted, slow velocity).
    Technical debt register: list items, severity, estimated fix time.
    Business language: "This debt costs us 2 days/sprint in maintenance".
    Priority: critical (security, stability) first.
    Propose: 20% capacity for tech debt per sprint.
  scoringGuide: *scoringBase

- code: "Q192"
  category: SOFT_SKILL
  subcategory: "Báo cáo"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Kể lần bạn phải báo cáo critical production incident lên CTO. Bạn chuẩn bị gì?
  expectedAnswer: |-
    Prepare: timeline, impact (users affected, revenue loss, duration), root cause, fix applied, prevention.
    Executive summary: 3-4 sentences.
    Honest, no spin.
    Own the incident.
    Present plan to prevent recurrence.
    CTO không cần technical details — cần: resolved? customers impacted? prevention?
  scoringGuide: *scoringBase

