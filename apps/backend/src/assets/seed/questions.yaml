- code: "Q049"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Mutex là gì? Mô tả cơ chế hoạt động và cho ví dụ khi cần dùng.
  expectedAnswer: |-
    Mutex (Mutual Exclusion): lock cho phép chỉ 1 goroutine/thread truy cập critical section.
    Lock trước khi vào, Unlock sau khi ra.
    Ví dụ: increment shared counter, update shared map.
    Dùng defer unlock để đảm bảo luôn unlock.
    Mutex không thể lock lại (deadlock nếu cùng goroutine lock 2 lần).
  scoringGuide: *scoringBase

- code: "Q050"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Race condition là gì? Cho đoạn code bị race condition và cách fix.
  expectedAnswer: |-
    Race condition: 2 goroutine/thread đọc-modify-write biến chung → kết quả không deterministic.
    Code bị lỗi: `count++` từ nhiều goroutine.
    Fix: sync.Mutex, atomic operations (sync/atomic), channel.
    Detect: Go race detector `go test -race`.
    Java: synchronized, AtomicInteger.
  scoringGuide: *scoringBase

- code: "Q051"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
