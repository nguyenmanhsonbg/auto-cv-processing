    CD: auto deploy đến staging/production.
    Pipeline stages: (1) Lint/format, (2) Build, (3) Unit tests, (4) Integration tests, (5) Security scan, (6) Build Docker image, (7) Push to registry, (8) Deploy to staging, (9) E2E/smoke tests, (10) Deploy to production.
  scoringGuide: *scoringBase

- code: "Q158"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
