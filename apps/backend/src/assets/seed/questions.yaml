  expectedAnswer: |-
    Comparator chained: `Comparator.comparingDouble(Product::getPrice).thenComparing(Product::getName)` (Java).
    Python: `sorted(products, key=lambda p: (p.price, p.name))`.
    Go: `sort.Slice` với multi-key comparison.
    Stable sort đảm bảo thứ tự relative khi keys bằng nhau.
  scoringGuide: *scoringBase

- code: "Q033"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Rate limit: 1 user tối đa 100 request/phút, distributed trên 10 server, không có shared memory. Bạn thiết kế thuật toán (Sliding Window, Token Bucket, Leaky Bucket) và data structure thế nào?
  expectedAnswer: |-
    Token Bucket: tokens refill theo rate, consume per request.
    Sliding Window Counter: Redis ZSET với timestamp members, count members trong window.
    Distributed: Redis atomic Lua script cho consistency.
    Token Bucket ở Redis: incr + expire.
    Trade-off: Fixed window (simple, thundering at edge) vs Sliding Window (smooth, more memory).
    Race condition: Lua script hoặc Redis transaction.
  scoringGuide: *scoringBase

- code: "Q034"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Real-time leaderboard cho 100 triệu users cập nhật liên tục, query top 100 dưới 50ms. Bạn thiết kế toàn bộ architecture thế nào?
  expectedAnswer: |-
    Redis Sorted Set: O(log n) update, O(log n + k) range query.
    Sharding by user_id mod N.
    Write: ZADD user:{id} score.
    Read top 100: ZREVRANGE leaderboard 0 99.
    Full rank cho 1 user: ZREVRANK.
    Persistence: DB cho durability, Redis cho speed.
    Near real-time vs eventual consistency trade-off.
  scoringGuide: *scoringBase

- code: "Q035"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho bài toán: tìm tất cả path từ node A đến node B trong đồ thị có hướng có thể có chu trình. Bạn giải thế nào và xử lý chu trình thế nào?
  expectedAnswer: |-
    DFS với visited set để phát hiện cycle.
    Khi đến B: record current path.
    Backtrack: remove current node khỏi visited khi backtrack.
    Space O(V+E) cho adjacency list.
    Time: worst O(2^V) vì tất cả paths.
    Với cycle: track "in current path" (gray) vs "fully explored" (black).
    Tránh re-visit node đang trong current path.
  scoringGuide: *scoringBase

- code: "Q036"
  category: BACKEND_MUST
  subcategory: "Thuật toán + Cấu trúc dữ liệu"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Tìm kiếm pattern trong chuỗi văn bản 1GB. Bạn chọn thuật toán nào (KMP, Rabin-Karp, Boyer-Moore) và tại sao?
  expectedAnswer: |-
    Boyer-Moore: O(n/m) best case khi pattern không match thường xuyên (best for large texts).
    KMP: O(n+m) worst case, good for small alphabets.
    Rabin-Karp: O(n+m) average, good for multiple pattern search simultaneously.
    Cho 1GB: stream processing + Boyer-Moore.
    Nếu nhiều pattern: Aho-Corasick (O(n + m + matches)).
  scoringGuide: *scoringBase

