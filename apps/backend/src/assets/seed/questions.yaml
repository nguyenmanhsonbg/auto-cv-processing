- code: "Q001"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Biên dịch (compiled) và thông dịch (interpreted) khác nhau thế nào? Cho ví dụ mỗi loại.
  expectedAnswer: |-
    Compiled: mã nguồn → binary trước khi chạy (C, Go, Java bytecode).
    Interpreted: thông dịch từng dòng lúc runtime (Python, JS).
    Trade-off: compiled nhanh hơn khi chạy, interpreted linh hoạt hơn khi phát triển.
  scoringGuide: &scoringBase |-
    1: Không trả lời được hoặc hiểu sai.
    2: Giải thích được lý thuyết, chưa có kinh nghiệm thực tế.
    3: Đã áp dụng trong dự án thực tế, có ví dụ cụ thể.
    4: Hiểu sâu, tối ưu được, mentor được người khác.

- code: "Q002"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Garbage Collection là gì? Mô tả cơ chế GC trong ngôn ngữ bạn đang dùng.
  expectedAnswer: |-
    GC tự động thu hồi bộ nhớ heap không còn tham chiếu.
    JVM: Mark-and-Sweep, Generational GC (Young/Old gen).
    Go: tri-color mark-sweep concurrent.
    GC pause time ảnh hưởng latency — cần hiểu để tune.
  scoringGuide: *scoringBase

- code: "Q003"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Interface và abstract class khác nhau thế nào? Khi nào dùng cái nào?
  expectedAnswer: |-
    Interface: contract thuần túy, không có state/implementation (Java 8+ có default method).
    Abstract class: có thể có state và partial implementation.
    Dùng interface khi định nghĩa behavior contract cho nhiều loại khác nhau; abstract class khi muốn share code và state.
  scoringGuide: *scoringBase

- code: "Q004"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Stack memory và heap memory khác nhau thế nào? Biến local và object lưu ở đâu?
  expectedAnswer: |-
    Stack: LIFO, tự động deallocate khi function return, lưu local variables và call frames.
    Heap: dynamic allocation, GC quản lý, lưu objects.
    Stack nhanh hơn nhưng giới hạn size.
    Biến local primitive → stack; reference variable → stack nhưng trỏ tới object trên heap.
  scoringGuide: *scoringBase

- code: "Q005"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn viết hàm đọc file lớn 1GB. Nếu đọc toàn bộ vào memory thì sao? Bạn xử lý thế nào bằng stream/buffer?
  expectedAnswer: |-
    Đọc toàn bộ 1GB → OOM error.
    Giải pháp: dùng stream đọc từng chunk (ví dụ 64KB).
    Java: BufferedReader; Go: bufio.Scanner; Node: fs.createReadStream.
    Xử lý từng line/chunk, không giữ toàn bộ data trong memory.
  scoringGuide: *scoringBase

- code: "Q006"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần viết utility function dùng được với cả int[], String[] và float[] — không duplicate code. Bạn dùng generic thế nào?
  expectedAnswer: |-
    Dùng Generic type parameter: `<T> void process(T[] arr)` (Java) hoặc `func process[T any](arr []T)` (Go).
    Type bounds khi cần constraint: `<T extends Comparable<T>>`.
    Giúp type-safe tại compile time, tránh casting, không duplicate logic.
  scoringGuide: *scoringBase

- code: "Q007"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Module A throw RuntimeException, module B throw checked IOException — khi cần xử lý cả 2 ở 1 chỗ, bạn viết code thế nào?
  expectedAnswer: |-
    Dùng multi-catch: `catch (RuntimeException | IOException e)`.
    Hoặc wrap IOException thành unchecked custom exception.
    Best practice: định nghĩa custom exception hierarchy rõ ràng (AppException → DatabaseException, IoException) để caller xử lý nhất quán.
  scoringGuide: *scoringBase

- code: "Q008"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Đoạn code dùng biến đếm trong closure bị sai kết quả trong vòng lặp. Giải thích tại sao và fix thế nào.
  expectedAnswer: |-
    Classic closure-over-loop-variable bug: tất cả closure capture cùng 1 reference đến biến i.
    Fix: (1) tạo local copy bên trong loop `let j = i`, (2) dùng IIFE, (3) dùng block scope `let` thay `var` (JS).
    Trong Go: pass loop var làm argument, không capture.
  scoringGuide: *scoringBase

- code: "Q009"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Team cần xây dựng internal SDK cho 5 team khác nhau dùng với use case khác nhau. Bạn thiết kế API và versioning strategy thế nào để đảm bảo backward compatibility?
  expectedAnswer: |-
    Thiết kế: stable public API surface, deprecation policy trước khi remove.
    Versioning: semantic versioning, major = breaking change.
    Backward compat: không remove/rename public method, chỉ add.
    Release notes + migration guide.
    Feature flags cho opt-in breaking changes.
    Tránh leak internal types ra public API.
  scoringGuide: *scoringBase

- code: "Q010"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hệ thống đang dùng Java 8, cần migrate lên Java 21 với zero-downtime. Bạn lên kế hoạch và risk mitigation thế nào?
  expectedAnswer: |-
    Bước: (1) Audit dependencies compatibility, (2) Enable warnings on deprecated APIs, (3) Fix compilation errors (module system, removed APIs), (4) Update test suite, (5) Canary deployment.
    Risk: module encapsulation (--add-opens), GC behavior change, removed APIs.
    Rollback plan: blue-green deployment.
  scoringGuide: *scoringBase

- code: "Q011"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Cho đoạn code xử lý business logic 500 dòng không có test. Bạn refactor từng bước thế nào mà không break behavior?
  expectedAnswer: |-
    Bước: (1) Characterization tests — viết test mô tả behavior hiện tại dù chưa hiểu ý nghĩa, (2) Extract method nhỏ, (3) Identify seams để inject dependencies, (4) Thêm unit test cho từng extracted method, (5) Refactor business logic.
    Không thay đổi behavior trước khi có test cover.
  scoringGuide: *scoringBase

- code: "Q012"
  category: BACKEND_MUST
  subcategory: "Ngôn ngữ lập trình"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn phát hiện hot path trong app bị gọi 1 triệu lần/ngày dùng reflection, gây chậm. Bạn profile và optimize thế nào?
  expectedAnswer: |-
    Profile: async-profiler/JProfiler xác nhận reflection là bottleneck.
    Optimize: (1) Cache Method objects sau lần đầu lookup, (2) Generate code với ByteBuddy/cglib thay reflection, (3) Chuyển sang direct method call nếu có thể.
    Measure: benchmark trước/sau với JMH.
    Reflection 10-100x chậm hơn direct call.
  scoringGuide: *scoringBase

