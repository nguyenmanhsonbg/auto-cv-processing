- code: "Q145"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    TCP và UDP khác nhau thế nào? Khi nào dùng UDP thay TCP?
  expectedAnswer: |-
    TCP: connection-oriented, reliable (retransmit), ordered, flow control.
    UDP: connectionless, no guarantee, faster, no overhead.
    Dùng UDP: real-time (gaming, video streaming, VoIP) khi latency quan trọng hơn reliability, DNS queries, QUIC (HTTP/3 built on UDP).
  scoringGuide: *scoringBase

- code: "Q146"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Mô hình OSI 7 tầng: kể tên từng tầng và vai trò chính.
  expectedAnswer: |-
    7-Physical (bits, cable), 6-Presentation (encoding, SSL), 5-Session (session mgmt), 4-Transport (TCP/UDP, port), 3-Network (IP routing), 2-Data Link (MAC, switch), 1-Physical.
    TCP/IP model: 4 tầng (Application, Transport, Internet, Network Access).
    Real-world: Layer 4 (TCP), Layer 7 (HTTP) load balancing.
  scoringGuide: *scoringBase

- code: "Q147"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Khi bạn gõ "google.com" vào browser và nhấn Enter, những gì xảy ra từng bước?
  expectedAnswer: |-
    1.
    DNS lookup (cache → resolver → root → TLD → authoritative).
    2.
    TCP 3-way handshake.
    3.
    TLS handshake (HTTPS).
    4.
    HTTP GET request.
    5.
    Server processes → response.
    6.
    Browser renders HTML (parse → DOM → CSSOM → render tree → layout → paint).
    7.
    Subsequent requests cho JS/CSS/images.
  scoringGuide: *scoringBase

- code: "Q148"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 1
  targetLevels: [ENTRY, EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    IP public và IP private khác nhau thế nào? Tại sao cần NAT?
  expectedAnswer: |-
    Private IP: 10.x.x.x, 172.16-31.x.x, 192.168.x.x — không routable trên internet.
    Public IP: globally routable.
    NAT: router translate private IP → public IP khi packet ra internet.
    Cho phép nhiều devices share 1 public IP.
    IPv4 exhaustion là lý do NAT phổ biến.
    IPv6 giải quyết bằng address space lớn hơn.
  scoringGuide: *scoringBase

- code: "Q149"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    App bạn deploy lên server bị lỗi "SSL certificate expired". Bạn xử lý thế nào và tránh tái diễn?
  expectedAnswer: |-
    Immediate: renew cert (Let's Encrypt: certbot renew).
    Verify: openssl s_client -connect domain:443.
    Prevent: auto-renewal cron (certbot --renew).
    Monitoring: alert 30/14/7 ngày trước expiry (Datadog, AWS Certificate Manager, UptimeRobot).
    Document: certificate inventory, ownership.
    Wildcard cert cho multiple subdomains.
  scoringGuide: *scoringBase

- code: "Q150"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    API gọi đến third-party thỉnh thoảng bị timeout. Bạn dùng curl/Postman/tcpdump để kiểm tra và xác định nguyên nhân thế nào?
  expectedAnswer: |-
    curl -v --max-time 10 https://api.third-party.com. tcpdump -i eth0 host api.third-party.com để xem packets.
    Kiểm tra: DNS resolution time, TCP connect time, TLS handshake time, TTFB.
    Wireshark cho deep analysis.
    Logging: add timing middleware.
    Pattern: timeout chỉ vào giờ cao điểm → rate limit bên họ.
  scoringGuide: *scoringBase

- code: "Q151"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    App cần giao tiếp với service nội bộ — bạn dùng HTTP/1.1 hay HTTP/2? Khi nào cần upgrade lên HTTP/2?
  expectedAnswer: |-
    HTTP/2: multiplexing (nhiều request trên 1 connection), header compression (HPACK), server push, binary protocol.
    Internal services: HTTP/2 hoặc gRPC (built on HTTP/2).
    Upgrade khi: nhiều parallel requests, high latency network, HOL blocking là vấn đề.
    HTTP/1.1 vẫn ok cho simple request/response. gRPC tốt hơn cho inter-service.
  scoringGuide: *scoringBase

- code: "Q152"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 2
  targetLevels: [EXPERIENCED, SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần setup load balancer cho 3 server backend. Với user session-sticky (cùng user luôn đến cùng server), bạn dùng thuật toán nào?
  expectedAnswer: |-
    Sticky sessions: IP Hash (hash source IP → same server, nhưng vấn đề nếu user dùng mobile/NAT).
    Cookie-based sticky: LB set cookie với server ID, subsequent requests route đến same server.
    Better: externalize session (Redis) → stateless → không cần sticky.
    Round Robin cho stateless services.
  scoringGuide: *scoringBase

- code: "Q153"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    App latency tăng đột ngột từ 50ms lên 500ms. Bạn phân tích từng layer (app, DB, network) để isolate bottleneck thế nào?
  expectedAnswer: |-
    Approach: (1) Check application metrics — CPU, memory, GC pauses.
    (2) Distributed tracing (Jaeger) để xem slow spans.
    (3) DB slow query log — long-running queries.
    (4) Network: ping, traceroute, netstat.
    (5) Infrastructure: disk I/O, network packet loss.
    Correlate với deploy history, traffic spike.
    Narrow down đến 1 component.
  scoringGuide: *scoringBase

- code: "Q154"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Hệ thống 10 triệu user cần multi-region failover, RTO < 1 phút khi 1 region down. Bạn thiết kế network và DNS strategy thế nào?
  expectedAnswer: |-
    Active-active multi-region.
    DNS: health checks + failover routing (Route53 latency routing + health checks).
    Global Accelerator cho consistent IP.
    DB: multi-master replication hoặc CockroachDB.
    RTO < 1 phút: health check interval 10s + DNS TTL 30s + warm standby.
    CDN cho static content.
    Chaos engineering: regular failover drills.
  scoringGuide: *scoringBase

- code: "Q155"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Service của bạn cần expose API ra internet và internal network với security khác nhau. Bạn thiết kế network segmentation thế nào?
  expectedAnswer: |-
    DMZ architecture: Public subnet (API Gateway, WAF), Private subnet (application servers), Isolated subnet (DB).
    Security Groups/NACLs: public API → LB; LB → app; app → DB (specific ports).
    Internal APIs: expose qua VPC private endpoint.
    Zero trust: mTLS giữa services.
    VPN cho admin access.
    Avoid flat network.
  scoringGuide: *scoringBase

- code: "Q156"
  category: BACKEND_SHOULD
  subcategory: "Mạng máy tính"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn cần setup VPN giữa on-premise server và cloud. Giải thích các approach: site-to-site VPN, Direct Connect, peering.
  expectedAnswer: |-
    Site-to-site VPN: IPSec tunnel qua internet, encrypt traffic, cost thấp, bandwidth giới hạn bởi internet.
    AWS Direct Connect: dedicated private line, low latency, high bandwidth, expensive, not encrypted by default.
    VPC Peering: connect 2 VPCs, no internet, same region (hoặc cross-region).
    Chọn: VPN cho non-critical, Direct Connect cho production high-throughput.
  scoringGuide: *scoringBase

