- code: "Q060"
  category: BACKEND_MUST
  subcategory: "Đa luồng"
  difficulty: 3
  targetLevels: [SENIOR, SPECIALIST]
  type: OPEN_ENDED
  isActive: true
  text: |-
    Bạn có shared config object được đọc nhiều và ghi ít. Bạn thiết kế thread-safe access thế nào mà không làm chậm read operations?
  expectedAnswer: |-
    Pattern 1: sync.RWMutex (RLock cho đọc, Lock cho ghi).
    Pattern 2: copy-on-write — atomic pointer, writer tạo new copy, atomic swap pointer.
    Pattern 3: sync.Map nếu key-value.
    Pattern 4: immutable config + channel để broadcast new config.
    Copy-on-write ưu việt nhất khi reads >> writes vì reads zero-lock.
  scoringGuide: *scoringBase

