  expectedAnswer: |-
    Logging: discrete events (ERROR: DB connection failed at 10:30).
    Monitoring/Metrics: aggregated numbers over time (request rate, error rate, latency).
    Tracing: track single request across multiple services (trace ID).
    Logs: What happened.
    Metrics: How system is performing.
    Traces: Where time is spent.
    Tools: ELK (logs), Prometheus+Grafana (metrics), Jaeger/Zipkin (traces).
  scoringGuide: *scoringBase

- code: "Q159"
  category: BACKEND_SHOULD
  subcategory: "DevOps"
