services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: interview_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_assistant
      JWT_SECRET: change-me-in-production
      NODE_ENV: development
      PORT: 3000
      UPLOAD_DIR: /app/apps/backend/uploads
      CV_QUARANTINE_DIR: /app/apps/backend/storage/cv-quarantine
      CV_SAFE_DIR: /app/apps/backend/storage/cv-safe
      CV_PDF_SANITIZER_MODE: DISPOSABLE_POOL
      CV_SANITIZER_POOL_ENABLED: 'true'
      CV_SANITIZER_POOL_MANAGER: 'false'
      CV_SANITIZER_POOL_MIN_READY: 1
      CV_SANITIZER_POOL_MAX_WORKERS: 2
      CV_SANITIZER_JOB_TIMEOUT_MS: 60000
      CV_SANITIZER_MAX_ATTEMPTS: 2
      CV_SANITIZER_READY_TIMEOUT_MS: 30000
      CV_SANITIZER_RECONCILE_INTERVAL_MS: 1000
      CV_SANITIZER_JOB_WAIT_TIMEOUT_MS: 90000
      CV_SANITIZER_WORKER_IMAGE: auto-cv-processing-cv-sanitizer-worker:latest
      CV_SANITIZER_CONTROL_DIR: /app/apps/backend/storage/cv-sanitizer-control
    depends_on:
      postgres:
        condition: service_healthy
      sanitizer-pool-manager:
        condition: service_started
    volumes:
      - uploads:/app/apps/backend/uploads
      - ./storage:/app/apps/backend/storage

  sanitizer-pool-manager:
    image: auto-cv-processing-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    command: ["pnpm", "start:pool-manager"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_assistant
      JWT_SECRET: change-me-in-production
      NODE_ENV: development
      TYPEORM_SYNCHRONIZE: 'true'
      CV_QUARANTINE_DIR: /app/apps/backend/storage/cv-quarantine
      CV_SAFE_DIR: /app/apps/backend/storage/cv-safe
      CV_PDF_SANITIZER_MODE: DISPOSABLE_POOL
      CV_SANITIZER_POOL_ENABLED: 'true'
      CV_SANITIZER_POOL_MANAGER: 'true'
      CV_SANITIZER_POOL_MIN_READY: 1
      CV_SANITIZER_POOL_MAX_WORKERS: 2
      CV_SANITIZER_JOB_TIMEOUT_MS: 60000
      CV_SANITIZER_MAX_ATTEMPTS: 2
      CV_SANITIZER_READY_TIMEOUT_MS: 30000
      CV_SANITIZER_RECONCILE_INTERVAL_MS: 1000
      CV_SANITIZER_JOB_WAIT_TIMEOUT_MS: 90000
      CV_SANITIZER_WORKER_IMAGE: auto-cv-processing-cv-sanitizer-worker:latest
      CV_SANITIZER_CONTROL_DIR: /app/apps/backend/storage/cv-sanitizer-control
    depends_on:
      postgres:
        condition: service_healthy
      cv-sanitizer-worker:
        condition: service_completed_successfully
    volumes:
      - ./storage:/app/apps/backend/storage
      - /var/run/docker.sock:/var/run/docker.sock

  cv-sanitizer-worker:
    image: auto-cv-processing-cv-sanitizer-worker:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: cv-sanitizer-worker
    command: ["true"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_URL: /api
    ports:
      - '3001:80'
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
