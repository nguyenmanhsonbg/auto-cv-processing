services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: interview_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_assistant
      JWT_SECRET: change-me-in-production
      NODE_ENV: development
      PORT: 3000
      UPLOAD_DIR: /app/apps/backend/uploads
      CV_QUARANTINE_DIR: /app/apps/backend/storage/cv-quarantine
      CV_SAFE_DIR: /app/apps/backend/storage/cv-safe
      CV_PDF_SANITIZER_MODE: HTTP_SERVICE
      CV_SANITIZER_SERVICE_URL: http://cv-sanitizer-pool-manager:8080
      CV_GHOSTSCRIPT_TIMEOUT_MS: 60000
    depends_on:
      postgres:
        condition: service_healthy
      cv-sanitizer-pool-manager:
        condition: service_healthy
    volumes:
      - uploads:/app/apps/backend/uploads
      - ./storage:/app/apps/backend/storage

  cv-sanitizer-pool-manager:
    image: auto-cv-processing-cv-sanitizer-pool-manager:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: cv-sanitizer-pool-manager
    environment:
      PORT: 8080
      CV_SANITIZER_CONTROL_DIR: /control-root
      CV_SANITIZER_WORKER_IMAGE: vcs-cv-sanitizer-worker:latest
      CV_SANITIZER_POOL_MIN_READY: 1
      CV_SANITIZER_POOL_MAX_WORKERS: 2
      CV_SANITIZER_READY_TIMEOUT_MS: 30000
      CV_SANITIZER_JOB_TIMEOUT_MS: 60000
      CV_QUARANTINE_DIR: /app/apps/backend/storage/cv-quarantine
      CV_SAFE_DIR: /app/apps/backend/storage/cv-safe
      CV_SANITIZER_MAX_OUTPUT_BYTES: 20971520
    expose:
      - '8080'
    ports:
      - '8080:8080'
    volumes:
      - ./storage:/app/apps/backend/storage
      - ./storage/cv-sanitizer-control:/control-root
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://127.0.0.1:8080/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 5s
      timeout: 5s
      retries: 5

  cv-sanitizer-worker:
    profiles:
      - build-only
    image: vcs-cv-sanitizer-worker:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: worker

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_URL: /api
    ports:
      - '3001:80'
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
